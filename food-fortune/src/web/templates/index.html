<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Fortune - 占卜美食引擎</title>
    <style>
        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-card: rgba(255, 255, 255, 0.06);
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0b0;
            --gold: #d4af37;
            --gold-dim: #a08020;
            --radius: 16px;
            --transition: 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, #0f3460 50%, var(--bg-primary) 100%);
            min-height: 100vh;
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }
        .header h1 {
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold) 0%, #f0d060 50%, var(--gold-dim) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            letter-spacing: 0.05em;
        }
        .header .subtitle {
            color: var(--text-secondary);
            font-size: 1.15rem;
            letter-spacing: 0.1em;
        }

        .mode-cards {
            display: flex;
            gap: 2rem;
            max-width: 800px;
            width: 100%;
            flex-wrap: wrap;
            justify-content: center;
        }

        .mode-card {
            flex: 1;
            min-width: 280px;
            max-width: 380px;
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius);
            padding: 2.5rem 2rem;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
            transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .mode-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
            border-color: var(--gold);
        }

        .mode-icon {
            font-size: 3.5rem;
            margin-bottom: 1.25rem;
        }
        .mode-card h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            color: var(--gold);
            letter-spacing: 0.05em;
        }
        .mode-card .desc {
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.7;
        }
        .mode-card .features {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        .mode-card .features span {
            opacity: 0.8;
        }
        .mode-badge {
            display: inline-block;
            margin-top: 1.25rem;
            padding: 0.35rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.05em;
        }
        .badge-static {
            background: rgba(212, 175, 55, 0.15);
            color: var(--gold);
            border: 1px solid rgba(212, 175, 55, 0.3);
        }
        .badge-dynamic {
            background: rgba(66, 165, 245, 0.15);
            color: #64B5F6;
            border: 1px solid rgba(66, 165, 245, 0.3);
        }

        .footer {
            margin-top: 3rem;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.8rem;
            line-height: 1.8;
        }

        @media (max-width: 640px) {
            .header h1 { font-size: 2rem; }
            .mode-cards { flex-direction: column; align-items: center; }
            .mode-card { max-width: 100%; padding: 2rem 1.5rem; }
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg-primary: #f5f0eb;
                --bg-secondary: #e8e0d5;
                --bg-card: rgba(255, 255, 255, 0.7);
                --text-primary: #2a2a2a;
                --text-secondary: #666;
            }
            .mode-card {
                border: 1px solid rgba(0, 0, 0, 0.08);
                box-shadow: 0 2px 16px rgba(0, 0, 0, 0.06);
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>占卜美食引擎</h1>
        <p class="subtitle">今天，宇宙想让你吃什么？</p>
    </div>

    <div class="mode-cards">
        <!-- 静态推荐卡片 -->
        <a href="/fortune?mode=static" class="mode-card">
            <div class="mode-icon">🔮</div>
            <h2>静态推荐</h2>
            <p class="desc">基于你的星座口味偏好与八字五行喜用神，推荐最适合你的中国菜。</p>
            <div class="features">
                <span>⭐ 星座 · 口味共鸣</span>
                <span>☯️ 八字 · 五行调补</span>
                <span>📋 每次结果一致</span>
            </div>
            <span class="mode-badge badge-static">星座 + 八字</span>
        </a>

        <!-- 动态推荐卡片 -->
        <a href="/fortune?mode=dynamic" class="mode-card">
            <div class="mode-icon">🌊</div>
            <h2>动态推荐</h2>
            <p class="desc">在星座与八字基础上，额外绑定今日流日天干，同一用户每天都可能获得不同推荐。</p>
            <div class="features">
                <span>⭐ 星座 · 口味共鸣</span>
                <span>☯️ 八字 · 五行调补</span>
                <span>🌊 流日 · 天干生克</span>
                <span>📋 每日结果不同</span>
            </div>
            <span class="mode-badge badge-dynamic">+ 流日天干</span>
        </a>
    </div>

    <div class="footer">
        <p>本工具仅供学习与娱乐，不构成任何饮食、医疗或决策建议。</p>
    </div>
</body>
</html>
