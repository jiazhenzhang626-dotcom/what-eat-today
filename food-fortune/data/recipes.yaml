冬瓜排骨汤:
  category: 粤菜
  flavors: [鲜, 咸, 甜]
  wuxingMatch: [水, 金, 土]
  ingredients:
    - 排骨 500g
    - 冬瓜 500g
    - 姜 5片
    - 葱 1根（打结）
    - 料酒 2大勺
    - 盐 适量
    - 枸杞 1小撮（可选）
  steps:
    - 排骨斩成小段，冷水下锅，加入2片姜和1大勺料酒，大火煮开焯水，撇去浮沫后捞出用温水冲洗干净。
    - 冬瓜去皮去瓤，切成3cm左右的厚块（不要切太薄，炖久了会化掉）。
    - 将焯好水的排骨放入汤锅，加入足量清水（一次加够，中途不加水），放入姜片和葱结。
    - 大火烧开后转小火，盖上锅盖慢炖40-50分钟，至排骨肉质酥软、汤色奶白。
    - 捞出葱结，将冬瓜块放入汤中，继续炖15-20分钟至冬瓜透明软烂。
    - 加入适量盐调味，撒上一小撮枸杞点缀，再煮2分钟即可关火。
    - 盛入汤碗，趁热食用。汤清味鲜，排骨酥烂，冬瓜入口即化，是一道滋养身心的好汤。
  prepTime: 10
  cookTime: 60
  constellationMessage:
    巨蟹座: "一锅温暖的冬瓜排骨汤，是巨蟹座心中最熨帖的安慰。今天让这碗热汤守护你细腻的情感和柔软的内心。"
