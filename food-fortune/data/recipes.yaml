    射手座: "射手座无辣不欢的味蕾，在宫保鸡丁的麻辣浓香中找到了归属。鸡丁香嫩、花生酥脆，每一口都是旅程中的惊喜。"
    狮子座: "狮子座大气磅礴，宫保鸡丁作为川菜经典，知名度与美味并重，配得上你今日的餐桌排面。"
    天蝎座: "天蝎座深邃而有层次，宫保鸡丁的复合味型正如你的内心世界——表面热烈，内里丰富，值得细细品味。"
