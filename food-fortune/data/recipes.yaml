西红柿炒蛋:
  category: 家常菜
  flavors: [甜, 酸, 咸]
  wuxingMatch: [火, 木]
  ingredients:
    - 鸡蛋 3个
    - 西红柿 2个（中等大小）
    - 葱 1根（切花）
    - 盐 适量
    - 白糖 1小勺
    - 食用油 3大勺
  steps:
    - 鸡蛋打入碗中，加少许盐，用筷子充分打散至蛋液起泡。
    - 西红柿洗净，在顶部划十字刀，用开水烫一下去皮（也可不去皮），切成小滚刀块。
    - 炒锅烧热，倒入2大勺食用油，油温八成热时倒入蛋液，待蛋液边缘凝固后用筷子快速划散。
    - 炒至鸡蛋成金黄色大块、八成熟时盛出备用。不要炒太老，保持嫩滑口感。
    - 锅中再加1大勺油，倒入西红柿块，中火翻炒至西红柿变软、出汁。
    - 加入白糖（中和酸味并提鲜），继续翻炒至西红柿汤汁浓郁。
    - 倒回炒好的鸡蛋，与西红柿翻炒均匀，让鸡蛋充分吸收西红柿汤汁。
    - 加入适量盐调味，撒上葱花，翻拌均匀即可出锅。配米饭食用堪称完美。
  prepTime: 5
  cookTime: 5
  constellationMessage:
