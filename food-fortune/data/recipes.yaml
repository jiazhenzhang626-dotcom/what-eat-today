# 每道菜包含：类别、口味标签、五行匹配、配料、步骤、文案模板

麻婆豆腐:
  category: 川菜
  flavors: [辣, 麻, 鲜, 咸]
  wuxingMatch: [火, 土]
  ingredients:
    - 嫩豆腐 1块（约400g）
    - 牛肉末 100g
    - 郫县豆瓣酱 2大勺
    - 豆豉 1小勺
    - 辣椒面 1大勺
    - 花椒粉 1小勺
    - 蒜末 1大勺
    - 姜末 1小勺
    - 葱花 适量
    - 生抽 1大勺
    - 水淀粉 适量
    - 食用油 3大勺
    - 高汤（或清水）1碗
  steps:
    - 豆腐切成2cm见方的小块，放入加了少许盐的开水中焯烫2分钟，捞出沥干备用。
    - 炒锅烧热，倒入食用油，油温六成热时下入牛肉末，中小火煸炒至肉末酥香、变色。
    - 加入郫县豆瓣酱和豆豉，继续翻炒至炒出红油，香味溢出。
    - 放入姜末、蒜末、辣椒面，翻炒均匀，使香料充分释放风味。
    - 倒入高汤（或清水），大火烧开，加入生抽调味。
    - 轻轻滑入焯好的豆腐块，转中火煮3-5分钟，让豆腐充分吸收汤汁。
    - 分两次淋入水淀粉勾芡，用锅铲轻轻推动豆腐使芡汁均匀包裹每一块豆腐。
    - 出锅装盘，撒上花椒粉和葱花即可。趁热食用风味最佳。
