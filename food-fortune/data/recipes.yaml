宫保鸡丁:
  category: 川菜
  flavors: [辣, 甜, 酸, 鲜]
  wuxingMatch: [火, 土, 木]
  ingredients:
    - 鸡胸肉 300g
    - 花生米 50g
    - 干辣椒 8-10个
    - 花椒 1小勺
    - 葱白 2根（切段）
    - 姜片 5片
    - 蒜瓣 3瓣（切片）
    - 生抽 1大勺
    - 醋 1大勺
    - 白糖 1大勺
    - 料酒 1大勺
    - 淀粉 1大勺
    - 盐 适量
    - 食用油 适量
  steps:
    - 鸡胸肉切成1.5cm见方的小丁，加入少许盐、料酒、淀粉抓匀，腌制15分钟。
    - 调制宫保汁：碗中混合生抽、醋、白糖、料酒、淀粉和2大勺清水，搅拌均匀备用。
    - 花生米提前用小火炒至微黄酥脆（或用现成的熟花生米），放凉备用。
    - 炒锅烧热，倒入比平时炒菜稍多的油，油温五成热时下入腌好的鸡丁，快速滑炒至鸡肉变白断生，盛出备用。
    - 锅中留底油，小火放入干辣椒段和花椒，慢慢炒出香味，辣椒颜色变深但不要炒糊。
    - 加入姜片、蒜片、葱白段，转大火爆香，倒入滑好的鸡丁翻炒均匀。
    - 倒入调好的宫保汁，快速翻炒使酱汁均匀裹在鸡肉上，汤汁收浓。
    - 最后加入花生米，快速翻拌几下即可出锅。花生米要最后放，保持酥脆口感。
  prepTime: 20
  cookTime: 10
  constellationMessage:
