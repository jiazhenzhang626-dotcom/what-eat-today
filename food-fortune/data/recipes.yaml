地三鲜:
  category: 东北菜
  flavors: [咸, 鲜, 甜]
  wuxingMatch: [土, 木]
  ingredients:
    - 土豆 1个（中等大小）
    - 茄子 1根
    - 青椒 1个
    - 蒜 3瓣（切片）
    - 生抽 2大勺
    - 蚝油 1大勺
    - 白糖 1小勺
    - 盐 适量
    - 淀粉 1小勺
    - 食用油 适量（用于煎炸）
  steps:
    - 土豆去皮切滚刀块，茄子带皮切滚刀块，青椒去籽切块。切好的茄子块撒少许盐腌5分钟，挤去水分（减少吸油）。
    - 小碗中调制碗芡：生抽、蚝油、白糖、盐、淀粉加3大勺清水混合均匀备用。
    - 炒锅烧热，多倒一些油，油温六成热时下入土豆块，中火煎至表面金黄微焦，捞出备用（土豆需煎透到内里熟软）。
    - 同样方法煎茄子块，茄子比较吸油，煎至表面金黄后捞出控油。
    - 锅中留少许底油，下蒜片爆香，放入青椒块大火快速翻炒至断生。
    - 倒回煎好的土豆和茄子，淋入调好的碗芡，大火快速翻炒使酱汁均匀挂在所有食材上。
    - 翻炒均匀后立即出锅，保持蔬菜的口感和鲜亮色泽。简单朴素却美味无比，是下饭利器。
