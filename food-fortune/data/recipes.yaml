糖醋里脊:
  category: 鲁菜
  flavors: [甜, 酸, 鲜]
  wuxingMatch: [木, 土]
  ingredients:
    - 猪里脊肉 300g
    - 鸡蛋 1个
    - 面粉 3大勺
    - 淀粉 3大勺
    - 番茄酱 3大勺
    - 白糖 2大勺
    - 白醋 2大勺
    - 生抽 1小勺
    - 料酒 1大勺
    - 盐 少许
    - 姜 3片
    - 食用油 适量（用于油炸）
    - 白芝麻 适量（装饰用）
  steps:
    - 猪里脊肉切成1cm粗的条状，加入少许盐、料酒、姜片腌制15分钟去腥。
    - 调制面糊：碗中混合面粉和淀粉（1:1），打入一个鸡蛋，加入适量清水搅拌成均匀的糊状，以能挂住肉条为宜。
    - 调制糖醋汁：碗中混合番茄酱、白糖、白醋、生抽和3大勺清水，搅拌均匀备用。
    - 锅中倒入足量食用油，烧至六成热（插入筷子周围冒小泡即可）。
    - 腌好的肉条均匀裹上面糊，逐条下入油锅，中火炸至金黄酥脆（约3-4分钟），捞出沥油。
    - 将油温升至八成热，将炸好的肉条复炸30秒，使其更加酥脆，捞出控油。
    - 另起锅，倒入少许底油，倒入调好的糖醋汁，小火加热并不断搅拌至酱汁浓稠冒泡。
    - 迅速倒入炸好的里脊条，大火快速翻炒使酱汁均匀包裹每一条肉，撒上白芝麻即可出锅。
