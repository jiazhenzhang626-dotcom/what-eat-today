红烧肉:
  category: 湘菜
  flavors: [甜, 咸, 鲜]
  wuxingMatch: [土, 火]
  ingredients:
    - 五花肉 500g
    - 冰糖 30g
    - 姜 5片
    - 葱 2根
    - 八角 2个
    - 桂皮 1小块
    - 香叶 2片
    - 生抽 2大勺
    - 老抽 1大勺
    - 料酒 2大勺
    - 盐 适量
    - 食用油 1大勺
  steps:
    - 五花肉洗净，切成3cm见方的方块。冷水下锅，加入2片姜和1大勺料酒，大火煮开焯水去腥，捞出用温水洗净沥干。
    - 炒锅烧热，加少许油，放入冰糖，小火慢炒至冰糖融化、变成琥珀色的糖色（注意不要炒焦，否则会发苦）。
    - 迅速放入焯好水的五花肉块，翻炒使每块肉均匀裹上糖色，炒至五花肉表面微黄、出油。
    - 加入姜片、八角、桂皮、香叶炒出香味，再淋入料酒、生抽、老抽翻炒均匀。
    - 加入没过肉块的开水（一定要用开水，冷水会让肉质变紧），大火烧开后转小火。
    - 盖上锅盖，小火慢炖45-60分钟，至肉块酥烂、用筷子可以轻松插入。
    - 开盖转大火收汁，期间不断翻炒防止粘锅，待汤汁浓稠、红亮、均匀挂在肉块上即可出锅。
    - 撒上葱花点缀，搭配一碗白米饭，肥而不腻、入口即化。
