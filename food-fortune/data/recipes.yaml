清蒸鲈鱼:
  category: 粤菜
  flavors: [鲜, 咸, 甜]
  wuxingMatch: [水, 金]
  ingredients:
    - 新鲜鲈鱼 1条（约600g）
    - 姜 1块（切片）
    - 葱 2根（切段）
    - 蒸鱼豉油 2大勺
    - 料酒 1大勺
    - 盐 适量
    - 食用油 2大勺
  steps:
    - 鲈鱼去鳞、去腮、去内脏，清洗干净，在鱼身两面各划3刀，方便入味。
    - 用盐和料酒均匀涂抹鱼身内外，腌制10分钟去腥。
    - 盘中铺上姜片和葱段，将腌好的鲈鱼放在上面，鱼肚里也塞入几片姜和葱。
    - 蒸锅加水烧开，水开后将鱼盘放入，大火蒸8-10分钟（根据鱼的大小调整时间，以鱼眼凸出、鱼肉变白为熟）。
    - 蒸好后取出，倒掉盘中蒸出的腥水，捡去蒸过的姜葱。
    - 在鱼身上重新铺上新鲜的葱丝和姜丝。
    - 另起小锅，将食用油烧至冒烟，均匀地浇在葱姜丝上，激发出香气。
    - 最后沿盘边淋入蒸鱼豉油即可。鱼肉蘸着豉油汤汁食用，鲜美无比。
