    - 锅留底油，下肉末煸炒至酥香，加入豆瓣酱炒出红油，放葱蒜末爆香。
    - 倒入炸好的茄条翻炒均匀，加入生抽、老抽、糖和少许盐调味。
    - 沿锅边淋入少许水，烧半分钟让茄子入味，淋水淀粉勾薄芡，撒葱花出锅。
