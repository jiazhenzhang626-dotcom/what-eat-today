# 家常菜谱数据 
# 每道菜包含口味、五行匹配、食材、步骤、星座文案和五行文案

西红柿炒蛋:
  category: 家常菜
  flavors: [酸, 鲜, 咸]
  wuxingMatch: [火, 木]
  ingredients:
    - 西红柿 2个
    - 鸡蛋 3个
    - 小葱
    - 生姜
    - 盐
    - 白糖
    - 食用油
  steps:
    - 西红柿洗净，顶部划十字刀，开水烫30秒后去皮，切成小瓣
    - 鸡蛋打入碗中，加少许盐和几滴水，充分搅打至起泡
    - 热锅凉油，油温六成时倒入蛋液，中火煎至底面凝固后用筷子快速划散，盛出备用
    - 锅留底油，下姜末爆香，倒入西红柿块中火翻炒出汁
    - 加入半勺白糖中和酸味，炒至西红柿软烂出沙
    - 倒回鸡蛋，翻炒均匀，加盐调味，撒葱花出锅
  prepTime: 10
  cookTime: 8
  constellationMessage:
    白羊座: "热情直接的白羊，今天这盘西红柿炒蛋的酸甜，就像你爱憎分明的性格，简单却让人回味无穷。"
    金牛座: "务实的金牛，最懂得家常才是真味，这盘鲜艳的西红柿炒蛋为你带来一整天的安心能量。"
    双子座: "灵动的双子偶尔也会想偷个懒，简单快手的西红柿炒蛋正合你意，五分钟搞定一顿温暖。"
    巨蟹座: "温柔的巨蟹，一碗西红柿炒蛋拌饭就是最好的治愈，家的味道总能让你卸下所有防备。"
    狮子座: "万人迷的狮子也会被这道国民家常菜征服，红黄相间的色泽正如你耀眼而温暖的光芒。"
    处女座: "追求完美的处女座请放心，这道西红柿炒蛋的酸甜均衡恰到好处，是你挑剔味蕾也会点赞的经典。"
    天秤座: "优雅的天秤喜欢一切和谐的美，西红柿与鸡蛋的绝配正如你心中永远的平衡之道。"
    天蝎座: "深沉的天蝎，也许今天的你需要一份不加修饰的温暖，这盘家常美味就是最真诚的陪伴。"
    射手座: "自由的射手走遍山川大海，偶尔坐下来吃一盘妈妈味的西红柿炒蛋，便是旅途中最美的停靠。"
    摩羯座: "努力拼搏的摩羯，别忘了照顾好自己，一碟西红柿炒蛋配热饭，是你不该错过的简单幸福。"
    水瓶座: "不走寻常路的水瓶座，这道最朴素的家常菜反而能给你最意想不到的灵感刷新。"
    双鱼座: "浪漫的双鱼，那鲜嫩滑蛋包裹着酸甜西红柿，像春风拂过你的舌尖，温柔又缱绻。"
  wuxingMessage:
    木: "木性生发向上，西红柿的生发之气与鸡蛋的滋养之力，助你舒展身心、焕发活力。"
    火: "火性炎上热烈，这道维生素C丰富的炒蛋为你点燃内心的小太阳，照亮今天每一步。"
    土: "土性厚重包容，家常菜承载大地的朴素能量，一碗拌饭便能让你稳稳扎根、踏实前行。"
    金: "金性收敛清肃，简单至极的西红柿炒蛋不事雕琢，恰如真金本色，回归食物本味。"
    水: "水性润下柔和，鸡蛋白润如珠、西红柿汁水丰沛，滋养你的内在，让心灵柔软有光。"

酸辣土豆丝:
  category: 家常菜
  flavors: [酸, 辣, 咸]
  wuxingMatch: [土, 金]
  ingredients:
    - 土豆 2个
    - 干辣椒 3-5个
    - 花椒 少许
    - 大蒜
    - 生姜
    - 米醋
    - 盐
    - 白糖
    - 食用油
  steps:
    - 土豆去皮切成细丝，放入清水中浸泡 10 分钟去除多余淀粉，捞出沥干
    - 干辣椒剪段去籽，大蒜切末，生姜切丝备用
    - 锅中烧开水，将土豆丝焯烫 30 秒后立刻捞出过凉水，沥干水分
    - 热锅凉油，下花椒粒小火炸香后捞出，再下干辣椒段、蒜末、姜丝爆香
    - 转大火，倒入土豆丝快速翻炒约 1 分钟
    - 沿锅边淋入一圈米醋激发香气，加盐和少许白糖提鲜，翻炒均匀即刻出锅
  prepTime: 15
  cookTime: 5
  constellationMessage:
    白羊座: "干脆利落的酸辣土豆丝正是白羊风格，大火快炒、酸辣过瘾，一口下去能量全开！"
    金牛座: "金牛爱吃但更懂吃，这盘酸辣脆爽的土豆丝看似平凡，却是考验火候功力的国民神菜。"
    双子座: "双子座今天或许思绪纷飞，来一口酸辣爽口的土豆丝，瞬间清醒——简单直接就是最好的解法。"
    巨蟹座: "念旧的巨蟹，酸辣土豆丝是小时候餐桌上的常客，一丝酸一丝辣都是熟悉的安心。"
    狮子座: "气场强大的狮子不需要山珍海味来证明自己，一道霸气的酸辣土豆丝同样能点燃全场。"
    处女座: "处女座对细节的把控在这道菜上完美体现，切工均匀、火候精准，每一口都恰到好处。"
    天秤座: "酸与辣的平衡正是天秤最擅长的领域，这道土豆丝像极了你在生活中追求的那种微妙和谐。"
    天蝎座: "外表低调、内涵丰富，酸辣土豆丝就像天蝎的你，看似普通实则层层滋味让人无法抗拒。"
    射手座: "简单快手又过瘾，这盘酸辣土豆丝是射手出发前的能量补给，吃饱了再去征服世界。"
    摩羯座: "踏实的土豆经刀工一变便是惊艳美味，摩羯也是这般——沉稳外表下藏着无限可能。"
    水瓶座: "越简单越见功底，这正是水瓶喜欢的哲学思辨，一道土豆丝足以让人回味无穷。"
    双鱼座: "酸中带辣像极了双鱼的感性世界，丰沛的情感简简单单却总是余韵悠长。"
  wuxingMessage:
    木: "木喜条达舒展，酸味入肝助生发，这道酸辣清爽的土豆丝为你理气舒郁、焕然一新。"
    火: "火性炎上，干辣椒的热烈点燃了温润土豆的潜能，火土相生，为你注入蓬勃动力。"
    土: "土为万物之母，土豆深深扎根大地，吃下这份沉稳厚重的能量，让你今天步步稳妥。"
    金: "金性清肃，刀切如丝、火候精准，这道菜体现的金之锋芒，助你果敢利落、事事干脆。"
    水: "水性润泽，土豆丝焯水留脆、酸中带润，为你补充内在的柔软与流动之力。"

鱼香茄子:
  category: 家常菜
  flavors: [鲜, 酸, 辣]
  wuxingMatch: [火, 木]
  ingredients:
    - 茄子 2根
    - 猪肉末 100克
    - 泡椒或郫县豆瓣酱
    - 大蒜
    - 生姜
    - 小葱
    - 酱油
    - 醋
    - 白糖
    - 淀粉
    - 食用油
  steps:
    - 茄子洗净切成长条或滚刀块，撒少许盐腌制 10 分钟，挤去多余水分
    - 调制鱼香汁：碗中加酱油、醋、白糖、淀粉和少量清水，搅拌均匀备用
    - 大蒜切末、生姜切末、小葱切葱花，泡椒剁碎
    - 热锅多油，油温七成热时下茄子条炸软表面微黄，捞出沥油
    - 锅留底油，下肉末炒至变色出油，加入泡椒碎、姜末、一半蒜末炒出红油和香气
    - 倒回茄子翻炒均匀，淋入鱼香汁快速翻拌至汁浓芡亮，撒入剩余蒜末和葱花，出锅装盘
  prepTime: 15
  cookTime: 12
  constellationMessage:
    白羊座: "鱼香茄子没有鱼却有鱼之鲜，就像白羊从不按常理出牌却又处处惊喜，今天大胆尝试吧！"
    金牛座: "软糯的茄子裹着浓郁的鱼香酱汁，金牛对美味的执着在这道川味经典里得到充分满足。"
    双子座: "双子对新鲜事物的好奇与鱼香茄子不谋而合——明明是素菜却吃出肉的满足感，太有趣了。"
    巨蟹座: "一口软烂入味的茄子像被温柔拥抱，蟹子今天需要的安慰和温暖，都在这一盘里了。"
    狮子座: "狮子天生爱做主角，这道鱼香茄子浓郁出彩，上桌就是焦点，今天的餐桌你是C位。"
    处女座: "处女座或许会纠结鱼香为何无鱼，但只要尝一口就会放下心防，完美的调味让你无话可说。"
    天秤座: "甜酸微辣的复合层次是天秤最爱的高级感，鱼香茄子用多重滋味演绎你心中的美学平衡。"
    天蝎座: "浓郁撩人的香气、深不可测的滋味，就像天蝎的内心世界，让人一尝上瘾再难忘怀。"
    射手座: "无鱼胜有鱼的奇思妙想简直是对射手探索精神的美食致敬，吃一口仿佛就能发现新大陆。"
    摩羯座: "看似家常的鱼香茄子要做得正宗需要功底，摩羯最懂这种默默积累而后惊艳众人的道理。"
    水瓶座: "鱼香——一个美食界的哲学悖论，水瓶座一定会为之着迷，打破常规却自成体系。"
    双鱼座: "酱汁浓稠如梦、茄子温柔似水，双鱼在这样的美食里总能找到属于自己的一片温柔乡。"
  wuxingMessage:
    木: "木主生发，茄子的清润之气与酱料的多重变化，助你如沐春风般舒展身心、灵感涌动。"
    火: "火性炎上，红油翻腾激发茄子本味，这一盘热烈的能量驱散你的疲惫，带来满满干劲。"
    土: "土爰稼穑，长茄生于沃土、吸收了大地精华，化为软糯力量稳稳支撑你的每一个决定。"
    金: "金曰从革，精工细作的火候与刀法体现了金的严谨，助你今日行事利落有章有法。"
    水: "水润万物，茄子含水丰沛、酱汁流淌如溪，滋养你内在的柔软，让一切顺势自然发生。"

京酱肉丝:
  category: 家常菜
  flavors: [咸, 鲜, 甜]
  wuxingMatch: [火, 土]
  ingredients:
    - 猪里脊肉 300克
    - 甜面酱
    - 大葱
    - 豆腐皮（干豆腐）
    - 黄瓜
    - 生姜
    - 料酒
    - 酱油
    - 白糖
    - 淀粉
    - 香油
    - 食用油
  steps:
    - 猪里脊肉切成细丝，加料酒、酱油、蛋清和淀粉抓匀上浆，腌制 15 分钟
    - 大葱取葱白切细丝，黄瓜切细丝，豆腐皮切成方块用开水烫软备用
    - 调酱汁：甜面酱加少量清水搅开，加入白糖和少许香油调匀
    - 热锅凉油，油温五成时下肉丝滑炒至变色，迅速捞出控油
    - 锅留底油，下姜末爆香，倒入调好的甜面酱小火慢炒至酱色油亮、香气扑鼻
    - 倒回肉丝快速翻匀，让每一根肉丝都裹满酱汁，淋少许香油出锅
    - 豆腐皮铺开，放上葱丝、黄瓜丝和酱肉丝，卷起即可享用
  prepTime: 20
  cookTime: 10
  constellationMessage:
    白羊座: "酱香浓郁的京酱肉丝像是白羊的火热宣言，大口卷饼、痛快吃肉，今天尽情释放你的豪情！"
    金牛座: "金牛对酱香浓郁的料理毫无抵抗力，京酱肉丝的层层滋味经过慢火细酱，正是你最爱的深度美味。"
    双子座: "自己动手卷出自己的专属口味，双子对这种可定制的美食充满兴趣，每一卷都是新鲜体验。"
    巨蟹座: "京酱肉丝的卷饼仪式感让巨蟹想起家的温暖，左手执饼、右手夹菜，是人间最美的烟火气。"
    狮子座: "酱色红亮如王袍，狮子座与这道皇家风范的京味经典一见如故，吃出王者气度。"
    处女座: "处女座欣赏每一个细节：丝丝匀称的刀工、火候精准的酱香，一筷子下去就知道功夫到家。"
    天秤座: "甜咸平衡、酱香悠长，天秤对风味的苛求在这道经典京菜里得到优雅的回应。"
    天蝎座: "酱色深沉如墨、滋味浓烈入骨，天蝎一眼就能看透这道菜的不简单，一如你的深邃魅力。"
    射手座: "卷一卷、咬一口、走天涯——射手喜欢这种随性自在的吃法，带着京城风味闯荡世界。"
    摩羯座: "京酱肉丝看似家常实则需要真功夫，摩羯最懂——任何高光背后都是默默积累的扎实技艺。"
    水瓶座: "传统京味与随性卷饼的组合简直是为水瓶量身打造，在规则里自由发挥，正是你的哲学。"
    双鱼座: "柔软豆皮环抱浓酱肉丝，双鱼在这样的包裹感里找到温暖，每一口都像被温柔地记挂着。"
  wuxingMessage:
    木: "木喜舒展，大葱青白生发之气带动全身气机，搭配嫩滑肉丝为你洗去疲惫、焕发活力。"
    火: "火性热烈，酱炒至红亮正是火候之功，这一盘酱香四溢的美味点燃你今天的拼搏热情。"
    土: "土德敦厚，甜面酱经发酵承载大地精华，酱香沉稳持久，为你带来踏实的饱足与力量。"
    金: "金主收敛，精细的刀切与火候拿捏彰显金性品格，助你今日行事有条不紊、精准到位。"
    水: "水性柔润，肉丝嫩滑多汁、豆腐皮温软如玉，在忙碌间隙给自己一份温柔的滋养。"

木须肉:
  category: 家常菜
  flavors: [鲜, 咸]
  wuxingMatch: [木, 金]
  ingredients:
    - 猪里脊肉 150克
    - 鸡蛋 2个
    - 干木耳 一把
    - 干黄花菜 少许
    - 黄瓜 半根
    - 生姜
    - 大蒜
    - 料酒
    - 酱油
    - 盐
    - 淀粉
    - 食用油
  steps:
    - 干木耳和黄花菜提前用温水泡发，木耳撕小朵、黄花菜去硬根，黄瓜切片备用
    - 猪里脊切薄片，加料酒、酱油、淀粉抓匀腌制 10 分钟
    - 鸡蛋打散加少许盐，热锅倒油炒熟划散，盛出备用
    - 锅留底油下姜蒜爆香，倒入肉片滑炒至变色
    - 加入木耳、黄花菜和黄瓜片，大火翻炒 1-2 分钟出香
    - 倒回鸡蛋，加酱油和盐调味，快速翻匀即可出锅
  prepTime: 20
  cookTime: 8
  constellationMessage:
    白羊座: "一道菜汇集木耳、鸡蛋、肉丝，丰富如白羊的每一天，快手却不失营养，给你高效能量！"
    金牛座: "金牛喜欢实实在在的美味，木须肉食材丰富、口感多层，每一口都是大地般的踏实满足。"
    双子座: "双子欣赏多样的组合，这道木须肉食材五彩纷呈，就像你心中永远鲜活的奇思妙想。"
    巨蟹座: "家常的木须肉是巨蟹心中的温暖符号，木耳清润、鸡蛋蓬松，像极了家的日常温馨。"
    狮子座: "狮子座值得被好食材包围，这一盘五彩缤纷的木须肉正是今天为光芒万丈的你打造的盛宴。"
    处女座: "处女座喜欢干净利落的搭配，木须肉食材分明、调味清爽，是你心目中的满分家常菜。"
    天秤座: "色彩和谐、口感均衡，天秤在这样一道赏心悦目的木须肉里，找到了属于自己的味觉美学。"
    天蝎座: "木耳的深沉与鸡蛋的明亮交织，像天蝎的内外世界，不张扬却总让人印象深刻。"
    射手座: "一盘炒尽山野之鲜，射手喜欢这种自在随心的料理，吃一口就仿佛沐浴在田野的微风里。"
