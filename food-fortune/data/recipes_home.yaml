蒜苔炒肉:
  category: 家常菜
  flavors: [咸, 鲜]
  wuxingMatch: [木, 水]
  ingredients:
    - 蒜苔 300克
    - 猪里脊肉 200克
    - 姜 1块
    - 生抽 1大勺
    - 料酒 1小勺
    - 淀粉 1小勺
    - 盐 适量
    - 食用油 适量
  steps:
    - 蒜苔掐掉老根和顶部花苞，洗净切寸段。猪里脊切细丝，加料酒、生抽、淀粉抓匀腌制。
    - 烧一锅水加少许盐和油，水开下蒜苔段焯烫40秒，捞出过凉水沥干，能保持翠绿脆嫩。
