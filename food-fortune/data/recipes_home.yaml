    - 热锅多油，油温七成时下羊肉片快速滑散至变色，即刻捞出控油
    - 锅留底油，下蒜片和洋葱丝大火翻炒至洋葱透明出香
    - 倒回羊肉，撒入孜然粉、孜然粒和辣椒粉，大火快速翻炒约 30 秒
    - 加盐调味，撒入香菜段翻拌两下立刻出锅
