菠萝炒饭:
  category: 家常菜
  flavors: [甜, 酸, 鲜]
  wuxingMatch: [火, 木]
  ingredients:
    - 隔夜米饭 一大碗
    - 菠萝 半个
    - 虾仁 10只
    - 鸡蛋 2个
    - 青豆 一把
    - 胡萝卜 半根
    - 腰果 少许
    - 咖喱粉 一小勺
    - 生抽
    - 盐
    - 白糖
    - 食用油
  steps:
    - 菠萝对半切开，挖出果肉切小丁，菠萝壳留作盛器；胡萝卜切小丁
    - 虾仁加少许盐和料酒腌制 5 分钟，鸡蛋打散加少许盐搅匀
    - 热锅少油，分别将虾仁煎至变红盛出，鸡蛋炒散盛出，腰果小火烘香盛出
    - 热锅凉油下胡萝卜丁和青豆翻炒至断生
    - 倒入米饭用铲背压散，大火炒至米粒分明、在锅中跳跃
    - 加入咖喱粉翻炒出金黄色泽，倒回虾仁、蛋碎和菠萝丁，加生抽和盐调味
    - 大火翻炒均匀，撒腰果翻两下，盛入菠萝壳中即可
  prepTime: 25
  cookTime: 10
  constellationMessage:
    白羊座: "菠萝炒饭金灿灿的颜色像白羊的热情！热带风情配炒饭的满足感，今天从舌尖开始一场冒险！"
    金牛座: "金牛对甜中带咸的复杂风味最为着迷，菠萝的酸甜与炒饭的咸香在口中交织，每一口都是幸福的层次。"
    双子座: "装在菠萝壳里的炒饭太有趣了！双子对这种颜值与创意并存的料理完全无法抵抗，先拍照再开动。"
    巨蟹座: "菠萝壳做碗的温馨创意让巨蟹想起小时候的趣味便当，食物的仪式感让寻常一顿饭变成了珍贵的回忆。"
    狮子座: "这道菠萝炒饭上桌就是全场最佳！金黄耀眼、造型出圈，狮子座最值得这样一场色香味俱全的盛宴。"
    处女座: "处女座欣赏这道菜的巧思——菠萝壳当碗不浪费一丁点，完美兼顾了环保美学与味觉体验。"
    天秤座: "菠萝的甜与虾仁的鲜在天秤的烹饪下精确配比，金黄翠绿相间，颜值与美味都做到了极致平衡。"
    天蝎座: "酸甜外衣下是咖喱的深沉酱香，像天蝎的多层人格——最甜美可亲的表象下往往藏着最丰富的内涵。"
    射手座: "一口菠萝炒饭就是一次热带旅行，射手今天的味蕾已被空投到普吉岛，阳光海浪都在嘴里盛开。"
