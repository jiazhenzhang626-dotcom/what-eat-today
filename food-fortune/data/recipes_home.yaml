干锅花菜:
  category: 家常菜
  flavors: [辣, 咸, 鲜]
  wuxingMatch: [火, 木]
  ingredients:
    - 花菜 1大颗
    - 五花肉 100克
    - 干辣椒 5-6个
    - 大蒜
    - 生姜
    - 大葱
    - 料酒
    - 生抽
    - 老抽
    - 白糖
    - 盐
    - 食用油
  steps:
    - 花菜掰成小朵，用淡盐水浸泡 10 分钟后沥干水分
    - 五花肉切薄片，干辣椒剪段，大蒜拍碎、生姜切片、大葱切段
    - 热锅不放油，将花菜干煸至表面微焦起斑，盛出备用
    - 锅中放少许油，下五花肉片中火煸至出油微焦，肉片卷曲
    - 加入干辣椒段、蒜、姜、葱段炒香，倒入花菜大火翻炒均匀
    - 沿锅边淋入料酒和生抽，加少许老抽上色和白糖提鲜，翻炒至花菜入味即可
  prepTime: 15
  cookTime: 12
  constellationMessage:
    白羊座: "干锅的热烈干香与花菜的脆嫩在口中碰撞，白羊喜欢的痛快直接都在这滋滋作响的小锅里了！"
    金牛座: "金牛对五花肉的焦香情有独钟，每一片薄肉都被煸得金黄焦脆，搭配入味的花菜，下饭无敌。"
    双子座: "双子喜欢干锅花菜的层次感——先煸后炒、干香与酱香交织，每一口都有意想不到的味觉变化。"
    巨蟹座: "一只小干锅端上桌还在滋滋作响，这样温馨的画面是巨蟹最喜欢的家常仪式感。"
    狮子座: "干锅上桌自带声效和香气，狮子座最享受这种一登场就吸引所有人目光的霸气出场方式。"
    处女座: "处女座欣赏干锅花菜的严谨流程——花菜必须干煸去水，五花肉必须煸到微焦，每一步都不能少。"
    天秤座: "花菜的清甜与五花肉的焦香在天秤的烹饪中精准平衡，吃到正好、不多不少就是最美的滋味。"
    天蝎座: "干锅越吃越入味、越品越深刻，像天蝎给人的印象——初见平常，细品却是越来越无法自拔。"
    射手座: "一锅干锅花菜配冰啤酒是射手周末最爱的放松方式，简单自在却又满口香气，生活本该如此。"
    摩羯座: "干锅的持久保温让摩羯可以慢慢吃完一顿饭不慌不忙，这种绵长的实用性正是你最看重的品质。"
    水瓶座: "花菜这种低调食材居然能做成餐厅头牌，水瓶对每一个逆袭的故事都有天生的好感与好奇。"
    双鱼座: "花菜如云朵般的柔软内里被酱香环抱，双鱼在这道干锅的热烈中找到了属于自己的温柔角落。"
  wuxingMessage:
    木: "木生气旺，花菜形如繁花蕴含着春日的蓬勃生机，助你舒展情怀、以崭新的心态面对今日。"
    火: "火功关键，干煸去水与大火爆炒双重火候让食材焕发本味，火的热情为你点燃今天的干劲。"
    土: "土爰稼穑，五花肉与醇厚酱料承载大地滋养之力，让你在饱足中感受到脚踏实地的心安。"
    金: "金主锐利，干煸的果断与爆炒的利落体现金性决断，助你今日快刀斩乱麻、清清爽爽做决定。"
    水: "水性内敛，花菜焯水留鲜、酱汁缓缓浸润，在干香热烈中为你保留一份滋润不燥的柔软。"

蚂蚁上树:
  category: 家常菜
  flavors: [辣, 咸, 鲜]
  wuxingMatch: [火, 水]
  ingredients:
    - 红薯粉条或粉丝 一把
    - 猪肉末 150克
    - 生姜
    - 大蒜
    - 小葱
    - 郫县豆瓣酱
    - 生抽
    - 老抽
    - 料酒
    - 白糖
    - 食用油
  steps:
    - 粉条用温水提前泡软，剪成适口长度，捞出沥干备用
    - 肉末加少许料酒和生抽抓匀腌制 5 分钟
    - 生姜、大蒜切末，小葱分葱白葱花切好
    - 热锅凉油下肉末中小火煸炒至酥香微焦，加入姜末、蒜末和葱白炒香
    - 加豆瓣酱炒出红油，倒入适量开水，加生抽、老抽和少许白糖调味
    - 水开后下入泡软的粉条，用筷子拨散使其均匀吸汁，中小火收至汤汁被粉条完全吸收
    - 出锅装盘，撒上葱花即可
  prepTime: 10
  cookTime: 10
  constellationMessage:
    白羊座: "肉末如蚂蚁攀附粉条——这道趣味十足的川味经典正合白羊的童心，香辣入味三分钟光盘！"
    金牛座: "金牛最爱这种粉条吸饱汤汁的满足感，每一根都晶莹剔透、滋味饱满，滑入口中满满幸福。"
    双子座: "蚂蚁上树这个名字让双子的好奇心爆棚——有趣的菜名背后是让人欲罢不能的香辣好味道。"
    巨蟹座: "粉丝的柔软和肉末的酥香是巨蟹最喜欢的安心组合，热腾腾一碗上桌，是再累也能被治愈的温暖。"
    狮子座: "有趣的名字、霸气的味道——蚂蚁上树是餐桌上最会制造话题的菜，狮子请尽情享受全场的掌声。"
    处女座: "处女座欣赏这道菜的精细——肉末要煸到酥香不焦、粉条要吸汁不烂，每一处都是对细节的致敬。"
    天秤座: "蚂蚁上树的趣味与美味在天秤看来是一种难得的生活雅趣，吃饭不止是为了饱腹，更是为了愉悦。"
    天蝎座: "肉末隐藏于粉条之间，像天蝎的低调却充满力量——外表平常，细细探寻却是无尽的滋味深度。"
    射手座: "射手喜欢有故事的食物，蚂蚁上树的名字自带画面感，边吃边想象蚂蚁爬树的可爱场景。"
    摩羯座: "蚂蚁上树用料简单却做出了极致滋味，摩羯欣赏这种平民食材逆袭的故事——默默努力终会发光。"
    水瓶座: "这道菜的名字就是最大的创意，水瓶欣赏第一个把肉末粉条叫做蚂蚁上树的人——平凡中见想象力。"
    双鱼座: "细软粉条滑入喉间像双鱼的梦境般流畅，每一根都裹满了肉香与酱韵，是舌尖上温柔的诗篇。"
  wuxingMessage:
    木: "木气疏通，粉条滑利通达肠道，搭配香辛之料的发散之力，助你气机通畅、心旷神怡。"
    火: "火性温香，肉末煸至酥香是火候的精细功夫，那缕焦香为你的今日注入了振奋与温暖。"
    土: "土爰稼穑，猪肉末与豆瓣酱皆为大地馈赠的厚味，入胃踏实，让你在忙碌中也能感受到安稳。"
    金: "金主收敛，肉末煸至干香酥脆是金性淬炼之功，助你今日去除杂念、专注于最重要的事情。"
    水: "水性润下，粉条吸水膨胀而晶莹剔透，如泉涌入心田，为你补充内在的柔软与流动之力。"

孜然羊肉:
  category: 家常菜
  flavors: [辣, 咸, 鲜]
  wuxingMatch: [火, 金]
  ingredients:
    - 羊腿肉 300克
    - 洋葱 半个
    - 香菜 适量
    - 孜然粉 一大勺
    - 孜然粒 一小勺
    - 辣椒粉
    - 生姜
    - 大蒜
    - 生抽
    - 料酒
    - 盐
    - 淀粉
    - 食用油
  steps:
