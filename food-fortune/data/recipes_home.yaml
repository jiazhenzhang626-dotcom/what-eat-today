家常豆腐:
  category: 家常菜
  flavors: [辣, 咸, 鲜]
  wuxingMatch: [金, 火]
  ingredients:
    - 老豆腐 1块
    - 猪瘦肉 80克
    - 黑木耳 一小把
    - 青椒 1个
    - 郫县豆瓣酱 1.5大勺
    - 葱姜蒜末 适量
    - 生抽 适量
    - 糖 适量
    - 淀粉 适量
    - 食用油 适量
  steps:
    - 豆腐切成三角厚片，入加盐的沸水中焯烫1分钟，沥干。瘦肉切片，木耳撕小朵，青椒切块。
    - 平底锅油热，下豆腐片中火煎至两面金黄定型，盛出备用。
    - 锅中留底油，下肉片炒至变色，放入豆瓣酱小火炒出红油，加葱姜蒜末爆香。
    - 倒入木耳和青椒翻炒半分钟，将煎好的豆腐回锅，加生抽和少许糖调味。
    - 淋入小半碗水淀粉勾芡，转大火快速翻勺，待芡汁均匀包裹所有食材即可出锅。
