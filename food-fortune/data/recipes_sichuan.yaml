# 川菜专辑 —— 20道经典四川风味
# 字段与 recipes.yaml 完全一致，含完整星座/五行文案

麻婆豆腐:
  category: 川菜
  flavors: [辣, 麻, 鲜]
  wuxingMatch: [火, 土]
  ingredients:
    - 嫩豆腐 1块
    - 牛肉末 100g
    - 郫县豆瓣酱 2大勺
    - 豆豉 1小勺
    - 辣椒面 1大勺
    - 花椒粉 1小勺
    - 蒜末 姜末 各1大勺
    - 葱花 适量
    - 生抽 水淀粉 食用油
  steps:
    - 豆腐切2cm方块，沸水加盐焯烫2分钟沥干。
    - 热油下牛肉末煸至酥香，加豆瓣酱豆豉炒出红油。
    - 下姜蒜末辣椒面炒香，加高汤烧开，生抽调味。
    - 滑入豆腐中火煮3-5分钟入味。
    - 分两次淋水淀粉勾芡轻推，撒花椒粉葱花出锅。
  prepTime: 15
  cookTime: 10
  constellationMessage:
    白羊座: "热情如火的白羊，麻婆豆腐的麻辣劲道正是你今日需要的味觉冲锋号。"
    金牛座: "金牛对经典滋味有执念，这道百年麻婆豆腐的层次感恰合你挑剔的味蕾。"
    双子座: "双子多变的心需要复合刺激，麻辣鲜香交织的麻婆豆腐让你每一口都有惊喜。"
    巨蟹座: "细腻的巨蟹，豆腐的温柔裹着火辣酱汁，像极了你外柔内刚的温暖灵魂。"
    狮子座: "霸气的狮子配霸气的麻婆，红亮热烈的一盘上桌，气场全开无人能挡。"
    处女座: "处女座欣赏分寸感，麻婆豆腐的麻辣平衡拿捏精准，正是你追求的讲究。"
    天秤座: "天秤追求和谐之美，麻婆豆腐的麻辣鲜嫩各自恰到好处，互不抢戏。"
    天蝎座: "天蝎的深沉藏着火热的内心，这道麻辣滚烫的麻婆豆腐刚好点燃你的灵魂。"
    射手座: "射手热爱冒险，川菜之魂麻婆豆腐就是味觉世界里最值得探索的那一站。"
    摩羯座: "务实摩羯也需偶尔放纵，一碗麻婆豆腐配米饭，是忙碌中最踏实的犒赏。"
    水瓶座: "特立独行的水瓶，麻婆豆腐用百年不变的个性风味致敬你与众不同的品味。"
    双鱼座: "双鱼的柔情需要一点热烈来平衡，麻婆豆腐温柔嫩滑下的火辣正是你需要的小浪漫。"
