    金: "金气肃降于酱香之中，助你化繁为简理清思路。"
    水: "煮肉的高汤富含水性精华，滋养你今日的身心根基。"

水煮鱼:
  category: 川菜
  flavors: [辣, 麻, 鲜]
  wuxingMatch: [水, 火]
  ingredients:
    - 草鱼 1条
    - 黄豆芽 200g
    - 干辣椒 20个
    - 花椒 2大勺
    - 郫县豆瓣酱 2大勺
    - 姜蒜末 蛋清 淀粉
    - 料酒 盐 食用油
  steps:
    - 鱼片成薄片上浆腌15分钟，鱼骨剁块。豆芽焯水铺碗底。
    - 热油炒豆瓣酱出红油，加姜蒜末炒香，加水烧开放盐调味。
    - 先下鱼骨煮3分钟捞出铺碗中，再逐片下鱼片煮1-2分钟变白捞出。
    - 汤汁倒入碗中没过鱼片，撒干辣椒段和花椒，浇滚烫热油激香。
  prepTime: 25
  cookTime: 15
  constellationMessage:
    白羊座: "水煮鱼的热烈直接如白羊行事风格，滚油浇下的滋滋声就是你的冲锋号。"
