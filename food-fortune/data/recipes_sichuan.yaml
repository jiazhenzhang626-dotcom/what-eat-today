芋儿鸡:
  category: 川菜
  flavors: [辣, 鲜, 咸]
  wuxingMatch: [土, 金]
  ingredients:
    - 土鸡 半只
    - 小芋头 400g
    - 郫县豆瓣酱 2大勺
    - 干辣椒 花椒 姜蒜
    - 葱段 生抽 老抽 料酒
    - 盐 食用油
  steps:
    - 土鸡斩块焯水沥干。芋头削皮切滚刀块泡水防氧化。
    - 热油煸鸡块至表面金黄盛出。余油炒豆瓣酱出红油，加干辣椒花椒姜蒜炒香。
    - 倒回鸡块加生抽老抽料酒翻匀，加开水没过鸡块大火烧开转小火炖30分钟。
    - 加芋头继续炖20分钟至软糯，大火收汁加葱段出锅。
  prepTime: 20
  cookTime: 60
  constellationMessage:
    白羊座: "芋儿鸡热腾腾一锅端上桌，白羊二话不说先夹一块鸡肉再夹一块芋头。"
    金牛座: "芋头吸饱了鸡汤后变得绵软入味，金牛觉得芋头比鸡肉还好吃。"
    双子座: "鸡肉的鲜与芋头的糯在口中交替上演，双子享受这种双主角的味觉对手戏。"
    巨蟹座: "芋儿鸡是最温暖的家常炖菜，巨蟹用它来治愈每一个疲惫的日子。"
    狮子座: "满满一锅分量十足的芋儿鸡，狮子座觉得这就是待客的最高诚意。"
    处女座: "芋头下锅的时机要精准早了会化晚了不入味，处女座对这种时机的把握赞许不已。"
    天秤座: "鸡肉与芋头的配比刚好一比一谁也不多不少，天秤喜欢这种公平的分配。"
    天蝎座: "芋头外表质朴内里却绵密入味，恰似天蝎不善表达却情感丰富的内心。"
    射手座: "芋儿鸡是四川乡土菜的代表，射手在乡村吃到最地道的那锅后会一直念念不忘。"
