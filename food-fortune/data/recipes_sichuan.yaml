回锅肉:
  category: 川菜
  flavors: [辣, 咸, 鲜]
  wuxingMatch: [火, 土]
  ingredients:
    - 猪后腿二刀肉 400g
    - 青蒜苗 3根
    - 郫县豆瓣酱 1.5大勺
    - 甜面酱 豆豉 各1小勺
    - 姜片 花椒 料酒 白糖
    - 食用油
  steps:
    - 整块肉冷水下锅加姜花椒料酒，煮至筷子能插入，捞出切薄片。
    - 青蒜苗斜切，蒜白蒜叶分开。热锅少油下肉片煸至卷曲出油。
    - 肉推到锅边，用余油炒香豆瓣酱豆豉至出红油。
    - 加甜面酱和白糖翻匀，先下蒜白再下蒜叶大火快炒至断生出锅。
  prepTime: 10
  cookTime: 25
  constellationMessage:
    白羊座: "一回锅就香气四溢的回锅肉，正如白羊不加掩饰的热情，干脆利落。"
    金牛座: "回锅肉将普通的猪肉化为传奇，金牛最懂得欣赏这种化平凡为神奇的智慧。"
    双子座: "煮后切片再回锅的做法趣味十足，双子会喜欢这道菜背后的巧思与变化。"
    巨蟹座: "回锅肉是四川人家的味道，巨蟹在这道菜里吃到的是满满的家乡温暖。"
    狮子座: "灯盏窝般的肉片卷曲有型，狮子座的餐桌上需要这样一道有腔调的硬菜。"
    处女座: "每一片肉都要切得薄而均匀，处女座对这分毫不差的刀工心领神会。"
    天秤座: "肥瘦相间的回锅肉不偏不倚，恰如天秤心中那把衡量万物的秤。"
    天蝎座: "看似家常实则暗藏功夫的回锅肉，正是天蝎外松内紧的处事风格。"
    射手座: "走遍四川每个角落的回锅肉，是射手旅途中不可错过的美味地标。"
    摩羯座: "耐得住水煮又经得起煸炒的回锅肉，就像历经打磨依然坚毅的摩羯。"
    水瓶座: "把煮好的肉再回锅炒一遍本就是创意之举，水瓶懂这种不走寻常路的智慧。"
    双鱼座: "青蒜苗的绿点缀在红亮的肉片间，这画面本身就是写给双鱼的诗。"
  wuxingMessage:
    木: "蒜苗青翠木气盎然，催动你今日的生机与创造力。"
    火: "火行煸炒出的焦香，为你注入一往无前的行动能量。"
