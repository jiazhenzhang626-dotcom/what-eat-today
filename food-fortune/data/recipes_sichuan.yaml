辣子鸡:
  category: 川菜
  flavors: [辣, 麻, 鲜]
  wuxingMatch: [火, 金]
  ingredients:
    - 鸡腿肉 500g
    - 干辣椒 30个
    - 花椒 2大勺
    - 姜蒜片 葱段
    - 料酒 生抽 盐 白糖 淀粉
    - 白芝麻 食用油
  steps:
    - 鸡腿斩小块加料酒生抽盐淀粉腌20分钟。干辣椒剪段温水泡5分钟沥干。
    - 七成热油炸鸡块至金黄酥脆捞出，升高油温复炸30秒逼出油脂。
    - 留底油小火炒姜蒜干辣椒花椒至辣椒酥脆香气四溢。
    - 倒入鸡块加盐白糖大火翻匀，撒芝麻葱段出锅。
