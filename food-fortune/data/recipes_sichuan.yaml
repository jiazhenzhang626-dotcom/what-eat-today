鱼香肉丝:
  category: 川菜
  flavors: [辣, 甜, 酸]
  wuxingMatch: [木, 火]
  ingredients:
    - 猪里脊肉 250g
    - 木耳 50g
    - 胡萝卜 青椒 各半个
    - 泡椒 3个
    - 姜蒜末 葱花
    - 生抽 醋 白糖 料酒 淀粉
    - 盐 食用油
  steps:
    - 肉切丝加盐料酒淀粉腌10分钟。木耳胡萝卜青椒分别切丝。
    - 调鱼香汁：生抽醋糖料酒淀粉水混合。热油滑肉丝变白盛出。
    - 炒泡椒碎和姜蒜末出红油，下胡萝卜木耳丝炒至断生。
    - 倒回肉丝淋鱼香汁，大火翻匀下青椒丝葱花收汁出锅。
