宫保鸡丁:
  category: 川菜
  flavors: [辣, 甜, 酸]
  wuxingMatch: [火, 金]
  ingredients:
    - 鸡胸肉 300g
    - 花生米 50g
    - 干辣椒 10个
    - 花椒 1小勺
    - 葱白 姜 蒜
    - 生抽 醋 白糖 料酒 淀粉
    - 盐 食用油
  steps:
    - 鸡肉切丁加盐料酒淀粉腌15分钟。调宫保汁：生抽醋糖料酒淀粉水混合。
    - 花生米小火炒酥脆盛出。热油滑炒鸡丁至变白盛出。
    - 小火炒香干辣椒花椒，加姜蒜葱白爆香，倒回鸡丁。
    - 淋宫保汁大火翻匀收浓，加花生米翻拌出锅。
