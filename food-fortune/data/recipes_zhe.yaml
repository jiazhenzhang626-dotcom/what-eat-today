    - 油条切成与春卷皮等宽的段。小葱切段。
    - 春卷皮平铺放上一段油条和几根葱段紧紧卷起。
    - 平底锅倒少许油中小火将葱包烩放入锅中小火慢煎至两面金黄酥脆。
    - 出锅趁热刷上甜面酱或辣酱即可。外脆内软葱香扑鼻。
  prepTime: 10
  cookTime: 10
