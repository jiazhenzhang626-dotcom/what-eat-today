    金牛座: "雪菜笋片和猪肉三种普通食材在猪油的点化下变成了让人欲罢不能的美味金牛对这种化平凡为神奇的厨艺很佩服。"
    双子座: "片儿川的名字让双子琢磨了好久原来片是指肉片儿是儿化音川是汤宽的意思汉语真有趣。"
