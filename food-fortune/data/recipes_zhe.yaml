红烧划水:
  category: 浙菜
  flavors: [咸, 甜, 鲜]
  wuxingMatch: [水, 火]
  ingredients:
    - 草鱼尾 2条
    - 蒜瓣 1整头
    - 姜片 5片
    - 葱段 2根
    - 生抽 2大勺
    - 老抽 1大勺
    - 料酒 1大勺
    - 白糖 1小勺
    - 食用油 适量
  steps:
    - 鱼尾去鳞洗净从中间竖切两半但尾部皮肉相连呈扇形展开。
    - 热锅倒油六成热下鱼尾煎至两面微黄定型盛出。
    - 锅中留底油下蒜瓣姜片葱段爆香放入煎好的鱼尾。
    - 加生抽老抽料酒白糖和没过鱼尾一半的开水大火烧开转小火焖10分钟。
    - 开大火收汁不断将汤汁舀起浇在鱼尾上至浓稠挂满撤火出锅。
  prepTime: 15
  cookTime: 20
  constellationMessage:
    白羊座: "红烧划水把最不起眼的鱼尾做成了主角白羊对这种化废物为神奇的厨艺表示佩服。"
