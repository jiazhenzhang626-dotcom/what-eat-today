片儿川:
  category: 浙菜
  flavors: [咸, 鲜, 酸]
  wuxingMatch: [土, 木]
  ingredients:
    - 潮面 200g
    - 猪里脊肉 100g
    - 雪菜 80g
    - 冬笋 50g
    - 姜片 3片
    - 生抽 1小勺
    - 猪油 1大勺
    - 盐 少许
  steps:
    - 猪里脊切薄片加少许生抽抓匀。雪菜洗净切碎。冬笋切片。
