    - 大锅水开逐个下入汤圆轻轻推动防粘，煮至汤圆浮起再加一碗冷水。
    - 水再次沸腾时汤圆已熟捞出盛碗中，浇入煮汤圆的原汤撒干桂花即可。
  prepTime: 50
