    处女座: "鳝段炸到酥而不焦虾仁滑到刚熟即止火候要各自精准处女座对这种分段控温的手法很认可。"
    天秤座: "虾仁的鲜甜与鳝鱼的浓郁在面条中找到了完美的共存天秤享受这碗面带来的双鲜体验。"
    天蝎座: "鳝段藏在浇头之下虾仁铺在表面之上层次分明正如天蝎愿意展示的和深藏不露的各有考量。"
    射手座: "虾爆鳝面是杭州无人不知的经典面食射手在奎元馆吃到了传说中最正宗的那一碗。"
    摩羯座: "虽然用料考究但一碗面营养全面高效管饱摩羯觉得偶尔奢侈吃一碗是值得的。"
    水瓶座: "把油炸鳝段和清炒虾仁放在一碗面里的创意是河鲜对面食的一次豪华跨界水瓶很欣赏。"
    双鱼座: "虾仁粉红鳝段金黄葱花翠绿一碗面像是一幅画双鱼在动筷子之前先被它的颜值打动。"
