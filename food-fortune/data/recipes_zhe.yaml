# 浙菜专辑 
# 字段与 recipes.yaml 完全一致，含完整星座/五行文案

西湖醋鱼:
  category: 浙菜
  flavors: [酸, 甜, 鲜]
  wuxingMatch: [水, 木]
  ingredients:
    - 草鱼 1条
    - 姜末 1大勺
    - 葱花 适量
    - 镇江香醋 3大勺
    - 白糖 3大勺
    - 生抽 1大勺
    - 料酒 1大勺
    - 水淀粉 适量
    - 盐 食用油
  steps:
    - 草鱼饿养两天去土腥。宰杀洗净后在鱼身两面各划几刀，抹盐和料酒腌10分钟。
    - 大锅水烧开加姜片，手提鱼尾将鱼放入沸水中，关火加盖浸泡约8分钟至熟。
    - 小心捞出装盘。锅中留少许浸鱼水，加生抽白糖香醋烧开。
    - 淋入水淀粉勾流芡至微微浓稠，浇在鱼身上，撒姜末葱花。
    - 另起锅烧少许热油淋在姜末葱花上激香即可。
  prepTime: 15
  cookTime: 15
  constellationMessage:
    白羊座: "西湖醋鱼的酸甜清爽让白羊在闷热天气里食欲大开，一口鲜嫩鱼肉配一口酸甜酱汁太过瘾。"
    金牛座: "不加一滴油煮出的鱼肉鲜嫩无比，金牛对这种极简烹饪中见真功夫的技艺赞叹不已。"
    双子座: "西湖醋鱼背后有宋嫂的动人传说，双子一边吃鱼一边品味这道千年名菜的文化底蕴。"
    巨蟹座: "西湖醋鱼是杭州人最引以为傲的待客菜，巨蟹在西湖边的楼外楼吃到时觉得这就是江南的温柔。"
    狮子座: "整条鱼横卧盘中浇上红亮的糖醋汁气场全开，狮子座对这道杭帮菜的头牌很满意。"
    处女座: "鱼要在清水中饿养两天去土腥味这个预处理步骤让处女座看到了对食材的极致尊重。"
    天秤座: "酸甜比例经过千年传承打磨到完美平衡，天秤觉得这就是历史验证过的黄金配比。"
    天蝎座: "看似简单的白水浸鱼实则暗藏精准的水温和时间把控，正如天蝎不张扬却蕴藏的深厚功力。"
    射手座: "到杭州不吃西湖醋鱼如同到北京不登长城，射手把它列为杭州美食之旅的第一站。"
    摩羯座: "不用一滴油的做法健康无比，摩羯觉得这就是最科学的鱼肉烹饪方式。"
    水瓶座: "用水浸代替油煎的做法独树一帜，水瓶对这种打破常规的烹饪逻辑很有兴趣。"
    双鱼座: "西湖醋鱼的名字让双鱼仿佛看到了烟雨朦胧的西子湖畔，这道菜本身就是一首江南的诗。"
  wuxingMessage:
    木: "姜末葱花与醋的酸味木气生发，为你今日带来开胃消食的清爽能量。"
    火: "沸水浸鱼的火候精准利落，在最短时间内锁住鱼肉的鲜嫩本真。"
    土: "白糖与醋的调和土气温润中和，在酸甜之间为你找到味觉的踏实。"
    金: "浸鱼的手法金行清肃干净，以最纯粹的方式呈现鱼肉的极致鲜美。"
    水: "草鱼生于西湖水性最为灵动鲜活，鱼与水共舞出江南最温柔的味道。"

东坡肉:
  category: 浙菜
  flavors: [咸, 甜, 鲜]
  wuxingMatch: [土, 火]
  ingredients:
    - 五花肉 800g
    - 冰糖 50g
    - 生抽 3大勺
    - 老抽 1大勺
    - 料酒 半碗
    - 葱段 姜片
    - 八角 2个
    - 桂皮 1小块
  steps:
    - 五花肉整块焯水定型捞出切成5cm见方的方块，用线将每块轻轻捆扎定型。
    - 砂锅底部垫葱段和姜片，将肉块皮朝下整齐码入锅中。
    - 加入生抽老抽冰糖八角桂皮，倒入料酒和少量水至刚好没过肉块。
    - 大火烧开转最小的文火慢炖2小时，中途翻面一次使皮朝上。
    - 开盖大火收汁至浓稠酱汁挂在每块肉上，皮色殷红油亮入口即化。
  prepTime: 20
  cookTime: 130
  constellationMessage:
    白羊座: "东坡肉皮糯肉烂入口即化，白羊在大口吃肉的时候感受到了什么叫化刚为柔的美食魔法。"
    金牛座: "两小时慢火细炖后的五花肉如同瑰宝，金牛觉得等待本身就是这道菜最奢侈的调味。"
    双子座: "苏东坡不仅是文人还是美食家让双子很感兴趣，原来大文豪也爱研究做菜。"
    巨蟹座: "东坡肉是杭州每家每户都会做的家常大菜，巨蟹在节日里炖一锅全家围坐分享最是温暖。"
    狮子座: "正方块的东坡肉码得整整齐齐如同玉石印章，狮子座觉得这就是餐桌上的艺术品。"
    处女座: "肉要切成标准的5cm方块还要用线捆扎定型，处女座对这种精准的尺寸要求非常满意。"
    天秤座: "肥而不腻瘦而不柴的完美平衡让天秤无从挑剔，这就是五花肉的最佳状态。"
    天蝎座: "看似简单的一块肉却需要漫长的等待才能呈现出最好的味道，正如天蝎厚积薄发的人生信条。"
    射手座: "沿着苏东坡的足迹品尝他发明的菜是射手最向往的美食文化之旅。"
    摩羯座: "一道菜既有文化底蕴又有扎实的营养价值，摩羯觉得这就是最高性价比的名菜。"
    水瓶座: "苏东坡把当时没人要的猪肉做成了流传千年的名菜，水瓶看到了化腐朽为神奇的创新力量。"
    双鱼座: "东坡肉的色泽如同琥珀般温润，双鱼在这块肉里看到了时间与火候共同创作的温柔艺术。"
  wuxingMessage:
    木: "八角桂皮的木香馥郁醇厚，为肉块注入时间沉淀后的复杂芬芳。"
    火: "文火慢炖的火行温润绵长，将五花肉的每寸肌理都炖得酥烂。"
    土: "猪肉土气最为厚实饱满，给你最深沉最踏实的动物蛋白滋养。"
    金: "收汁浓缩的金行精华内敛，将全部的风味力量凝于方寸之间。"
    水: "料酒与肉汁的水性融合渗透，将刚硬的肉质化为入口即化的绕指之柔。"

龙井虾仁:
  category: 浙菜
  flavors: [鲜, 甜, 咸]
  wuxingMatch: [水, 木]
  ingredients:
    - 大河虾仁 300g
    - 龙井新茶 10g
    - 蛋清 1个
    - 淀粉 1大勺
    - 料酒 1小勺
    - 盐 适量
    - 食用油 适量
  steps:
    - 虾仁挑去虾线洗净沥干，加盐蛋清淀粉抓匀上浆冷藏30分钟。
    - 龙井茶叶用80度热水冲泡，取第二泡的茶水半杯和泡开的茶叶备用。
    - 热锅多油四成热下虾仁滑油至变白卷曲立即捞出控油。
    - 锅中留底油倒入虾仁淋入少许茶水加盐快速翻炒。
    - 关火撒入泡开的茶叶片利用余温激出茶香即可装盘。
  prepTime: 35
  cookTime: 5
  constellationMessage:
    白羊座: "龙井虾仁清雅鲜嫩一口一个，白羊被这道菜的清爽口感收服了，原来虾仁可以如此优雅。"
    金牛座: "只有清明前后的龙井和鲜活河虾才能做出这道菜的真味，金牛对这种食材的季节性追求很认同。"
    双子座: "把茶叶和虾仁放在一起炒的跨界创意让双子很着迷，这就是杭帮菜的天才想象力。"
    巨蟹座: "龙井虾仁是杭州招待贵客的最高礼遇，巨蟹在这道菜里感受到了江南人的待客雅意。"
    狮子座: "虾仁洁白如玉茶叶翠绿如翡翠的配色高级雅致，狮子座对这道菜的颜值赞不绝口。"
    处女座: "虾仁上浆要薄而均匀滑油的油温要精准控制在四成，处女座对这种一丝不苟的工艺很满意。"
    天秤座: "虾仁的鲜与茶叶的香谁也不压谁形成完美平衡，天秤觉得这就是最理想的食材合作。"
    天蝎座: "龙井的茶香是若隐若现的并不抢戏，正如天蝎低调而持久的魅力从不是张扬的存在。"
    射手座: "龙井虾仁是杭州春天限定的美味，射手在清明前后到杭州一定要尝这道时令名菜。"
    摩羯座: "简单几种食材精工细作后的效果远超预期，摩羯看到了专注把每件小事做好的工匠价值。"
    水瓶座: "把茶叶从饮品跨界到调味的创意是烹饪史上的一次革命，水瓶对这种打破边界的思维很欣赏。"
    双鱼座: "龙井虾仁的意境太美了，双鱼仿佛看到了一片茶山和一方湖水在盘中温柔相遇。"
  wuxingMessage:
    木: "龙井新茶的木气最为清雅鲜灵，为你今日带来春天的第一缕清香。"
    火: "滑油的微火温而不烈恰到好处，在最短时间内锁住虾仁的鲜嫩。"
    土: "虾仁的鲜甜土气温和细腻，给你一份不张扬却深刻的高蛋白滋养。"
    金: "虾仁洁白如玉金行清肃纯净，帮你回归最简单纯粹的味觉享受。"
    水: "虾仁生于河湖水性充沛灵动，茶与水交融将江南的灵气送进你的身心。"

叫花童鸡:
  category: 浙菜
  flavors: [鲜, 咸, 甜]
  wuxingMatch: [土, 火]
  ingredients:
    - 童子鸡 1只
    - 荷叶 2张
    - 猪网油 1张
    - 猪肉丝 100g
    - 香菇 6朵
    - 冬笋 50g
    - 姜片 葱段
    - 生抽 蚝油 料酒 盐 白糖
  steps:
    - 童子鸡处理干净用生抽蚝油料酒盐糖抹匀内外腌2小时。
    - 猪肉丝香菇丝冬笋丝炒香作填料塞入鸡腹用竹签封口。
    - 鸡身用猪网油包裹一层，再裹两层荷叶用线扎紧。
    - 外层裹上厚厚一层黄泥或面团密封。入烤箱180度烤2.5小时。
    - 出炉敲开泥壳剥开荷叶，鸡肉酥烂香气四溢即可上桌。
  prepTime: 30
  cookTime: 160
  constellationMessage:
    白羊座: "敲开泥壳的瞬间香气扑面而来如同拆一份精心包裹的礼物，白羊太喜欢这个仪式感了。"
    金牛座: "荷叶和猪网油双层包裹把鸡的鲜味全部锁在了里面，金牛对这种古老的保鲜智慧深表佩服。"
    双子座: "叫花童鸡的名字来源于一个叫花子发明做法的有趣传说，双子对这道菜背后的故事津津乐道。"
    巨蟹座: "敲开泥壳一家人围坐剥荷叶的画面是巨蟹心中最温暖的聚餐场景。"
    狮子座: "端上桌再现场敲开泥壳的戏剧性就是狮子座最爱的高光时刻。"
    处女座: "荷叶包裹要两层且线要扎紧不能有缝隙，处女座对这种严密的密封工艺表示认可。"
    天秤座: "荷叶清香鸡肉浓香和填料鲜香三种香气层次分明和谐共存，天秤为这份嗅觉平衡所倾倒。"
    天蝎座: "最精彩的部分藏在层层的包裹之下等待被发现，正如天蝎深藏不露的惊人魅力。"
    射手座: "叫花童鸡是杭州楼外楼的招牌之一，射手为了一睹敲泥开壳的仪式专程前往。"
    摩羯座: "虽然工序繁复但全程烤箱和泥壳在出力，摩羯觉得这道菜其实很省心。"
    水瓶座: "用泥巴包裹食材进行烘烤是远古烹饪智慧，水瓶对这种流传千年的原始烹饪方式很着迷。"
    双鱼座: "荷叶的清香让双鱼仿佛置身于西湖的荷花丛中，这道菜是一首可以吃的江南田园诗。"
  wuxingMessage:
    木: "荷叶的清香木气最为纯粹自然，为你今日带来大自然最原始的芬芳。"
    火: "长时间烘烤的火行温润深入骨髓，将鸡的每一寸肌理都烤得酥烂。"
    土: "泥壳封裹土行包容万象，为鸡肉提供了最原始也最可靠的烹饪庇护。"
    金: "猪网油的金行油脂渗透入肉，为你提供最丰腴的动物脂肪滋养。"
    水: "密封包裹锁住水性不流失，让鸡肉在长达两个半小时的烘烤中依然多汁。"

干炸响铃:
  category: 浙菜
  flavors: [咸, 鲜, 甜]
  wuxingMatch: [金, 火]
  ingredients:
    - 豆腐皮 6张
    - 猪里脊肉 200g
    - 鸡蛋 1个
    - 料酒 生抽 盐 葱姜末
    - 淀粉 适量
    - 食用油 足量
    - 椒盐或甜面酱 蘸食用
  steps:
    - 猪里脊剁成肉泥加葱姜末料酒生抽盐蛋液搅匀成馅。
    - 豆腐皮一张张揭平，均匀抹上一层薄肉馅，卷成长条圆筒状。
    - 切成3cm长的段，两端沾少许淀粉封口。
    - 锅中足量油七成热下响铃段，中小火炸至金黄酥脆浮起捞出控油。
    - 趁热蘸椒盐或甜面酱食用，咬下去咔嚓作响故名响铃。
  prepTime: 25
  cookTime: 10
  constellationMessage:
    白羊座: "干炸响铃咬下去咔嚓作响干脆利落，白羊觉得这就是最解压的零食没有之一。"
    金牛座: "豆腐皮裹着肉馅炸到酥脆的创意让金牛很欣赏，这就是最简单食材的最高级变身。"
    双子座: "响铃这个名字太有趣了，双子边吃边听咔嚓声觉得这道菜名不虚传。"
    巨蟹座: "干炸响铃是杭州人过年必备的炸物之一，巨蟹对这道年味十足的菜有着特殊的感情。"
    狮子座: "金黄酥脆的响铃整齐码盘颜值很高，狮子座觉得这道小食拿来待客毫不丢面。"
    处女座: "肉馅要抹得薄而均匀卷得松紧适中，处女座对这种标准化的手工活很认可。"
    天秤座: "酥脆的外皮与鲜嫩的内馅形成了口感的完美对比，天秤喜欢这种内外兼修的小食。"
    天蝎座: "豆腐皮外表朴素内里却裹着鲜美的肉馅，正如天蝎不善言表的表面下藏着丰富的内心。"
    射手座: "干炸响铃是杭州最受欢迎的传统小食之一，射手在河坊街边买边吃最有感觉。"
    摩羯座: "一次可以做很多冷冻保存想吃随时炸，摩羯觉得这就是最高效的备餐策略。"
    水瓶座: "把豆腐皮卷成响铃的形状再炸到会响的创意很妙，水瓶对这种多感官的美食设计很感兴趣。"
    双鱼座: "响铃在油锅中翻滚变金黄的过程很治愈，双鱼在一旁看得目不转睛。"
  wuxingMessage:
    木: "葱姜的辛香木气清新开胃，为你今日的味蕾奏响美食的序曲。"
    火: "油炸的火行炽烈干脆，将豆腐皮炸得金黄酥脆吹弹可破。"
    土: "猪肉馅的土气丰腴饱满，在酥脆外壳下藏着最厚实的鲜香。"
    金: "豆腐皮的金行清肃通透薄如蝉翼，炸制后轻脆如铃铛作响。"
    水: "蛋液与肉汁的水性柔和包容，将各种食材的精华温柔地凝聚在一起。"

宋嫂鱼羹:
  category: 浙菜
  flavors: [酸, 鲜, 咸]
  wuxingMatch: [水, 木]
  ingredients:
    - 鳜鱼或鲈鱼 1条
    - 火腿丝 30g
    - 冬笋丝 50g
    - 香菇丝 4朵
    - 蛋清 1个
    - 姜丝 葱花
    - 镇江香醋 3大勺
    - 料酒 盐 白胡椒粉
    - 水淀粉 适量
    - 高汤 1碗
  steps:
    - 鱼蒸熟去骨拆成碎鱼肉。火腿冬笋香菇分别切细丝。
    - 锅中倒入高汤大火烧开，放入火腿丝笋丝香菇丝煮3分钟出味。
