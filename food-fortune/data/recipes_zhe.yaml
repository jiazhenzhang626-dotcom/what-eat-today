    双子座: "划水这个名字让双子很好奇原来是鱼尾巴在水中不停划动所以叫划水这名字太形象了。"
    巨蟹座: "红烧划水是江南人家最家常的红烧鱼菜巨蟹觉得这浓油赤酱的味道就是家的味道。"
    狮子座: "两条鱼尾扇形展开在盘中造型独特狮子座对这道菜的摆盘艺术表示认可。"
    处女座: "鱼尾煎的焦脆程度火候刚好不能煎散又要保证外焦里嫩处女座对这种精准的把控很满意。"
    天秤座: "鱼尾肉质嫩滑入口后酱油的咸甜平衡恰到好处天秤觉得这就是红烧鱼的黄金味道。"
    天蝎座: "鱼尾看似是被丢弃的边角料却藏着最鲜嫩的鱼肉正如天蝎被低估的表面下惊人的实力。"
    射手座: "一道菜只取鱼尾来做是江南人精细饮食文化的体现射手对这种物尽其用的精神很感兴趣。"
    摩羯座: "鱼尾价格便宜却可以做出不输中段的美味摩羯觉得这就是最有性价比的鱼肉选择。"
    水瓶座: "把鱼身上最活跃的部位单独做成一道菜是结构与功能的美食解剖学水瓶对这种分部位烹饪的思路很着迷。"
    双鱼座: "鱼尾在酱汁中慢慢红烧的画面让双鱼觉得很温暖这是厨房里最平凡也最动人的一幕。"
  wuxingMessage:
    木: "葱姜蒜的辛香木气去腥增香为鱼尾奠定了清爽开胃的底味。"
    火: "红烧的火行温润收汁将酱汁的咸甜一寸寸渗透到鱼尾的每一丝肌理。"
    土: "酱油与白糖的调和土气温润醇厚在鱼尾上凝结成最诱人的浓稠酱汁。"
    金: "煎鱼的金行干脆利落将鱼尾的外皮锁紧保护了内在的鲜嫩多汁。"
    水: "草鱼生于淡水水性充沛胶质丰盈在经过火的淬炼后展现出最软糯的一面。"

油焖春笋:
  category: 浙菜
  flavors: [甜, 咸, 鲜]
