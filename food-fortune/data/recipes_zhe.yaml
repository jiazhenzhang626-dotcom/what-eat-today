    水: "焯水与焖制的水性温润渗透将笋的涩味带走留下最纯粹的清甜。"

韭菜炒螺丝:
  category: 浙菜
  flavors: [鲜, 咸, 辣]
  wuxingMatch: [木, 水]
  ingredients:
    - 螺丝肉 300g
    - 韭菜 1把
    - 干辣椒 3个
    - 姜末 1小勺
    - 蒜末 1大勺
    - 生抽 1大勺
    - 料酒 1大勺
    - 盐 少许
    - 食用油 2大勺
  steps:
    - 螺丝肉用清水反复搓洗去泥沙沥干。韭菜切段干辣椒切段。
    - 热锅倒油下姜蒜末干辣椒爆香倒入螺丝肉大火快速翻炒加料酒去腥。
    - 加生抽翻炒均匀后放入韭菜段大火快炒30秒至韭菜断生。
    - 加少许盐调味翻匀即可出锅。春韭配螺丝是江南人最懂的一口鲜。
  prepTime: 15
  cookTime: 5
  constellationMessage:
    白羊座: "韭菜炒螺丝下锅到出锅几分钟搞定白羊就爱这种干脆利落的快手菜。"
    金牛座: "春天的第一茬韭菜配上当季最肥的螺丝肉金牛觉得这就是春天最实在的时令美味。"
    双子座: "韭菜和螺丝的搭配让双子觉得很妙田园与河流在这盘菜中实现了味觉的跨界合作。"
    巨蟹座: "春天的韭菜炒螺丝是江南人家餐桌上的时令标配巨蟹用这道菜来迎接每一个崭新的春天。"
    狮子座: "虽然食材朴素但大火快炒出的锅气让这道菜香气四溢狮子座对它没有任何怨言。"
    处女座: "螺丝肉要反复搓洗去泥沙这是不可省略的步骤处女座对这种卫生底线的坚持很认同。"
    天秤座: "韭菜的辛香与螺丝的鲜美在口中达成了完美的协作天秤享受这盘菜的简洁平衡。"
    天蝎座: "韭菜割了一茬又长一茬的顽强生命力与天蝎永不言弃的韧性不谋而合。"
    射手座: "韭菜炒螺丝是江南春天最接地气的时令小炒射手在江南的小馆子里吃到了春天的第一口鲜。"
    摩羯座: "韭菜和螺丝都是春季最便宜的时令食材摩羯觉得最高性价比的美食永远在当季。"
    水瓶座: "韭菜和螺丝这种看似不搭的食材放在一起居然产生了奇妙的鲜味协同效应水瓶对这种食材搭配的化学原理很感兴趣。"
    双鱼座: "韭菜翠绿螺丝白嫩的画面是春天最朴素的色彩双鱼在这盘菜里看到了江南春天的样子。"
  wuxingMessage:
    木: "韭菜辛香木气最为鲜活生发为你今日的餐桌注入春天最蓬勃的生命力。"
    火: "大火快炒的火行干脆炽烈将韭菜的清香和螺丝的鲜美瞬间锁住。"
    土: "螺丝肉的韧性土气实在有嚼劲为你提供最踏实的河鲜蛋白质。"
    金: "姜蒜的辛香金行去腥提鲜为这道春日的时令小炒奠定清爽的底味。"
    水: "螺丝生于河湖水性充沛鲜活将整条河流的灵气浓缩于小小的壳中。"

清汤越鸡:
  category: 浙菜
  flavors: [鲜, 咸, 甜]
  wuxingMatch: [金, 水]
  ingredients:
    - 越鸡 1只
    - 火腿片 50g
    - 冬笋 1根
    - 香菇 6朵
    - 姜片 5片
    - 葱段 2根
    - 料酒 3大勺
    - 盐 少许
  steps:
    - 越鸡宰杀处理干净焯水去血沫捞出冲洗干净。
    - 整鸡入大砂锅加足量清水放姜片葱段料酒火腿片冬笋片香菇。
    - 大火烧开转最小的文火慢炖2.5小时至鸡肉酥烂汤清味醇。
    - 出锅前加少许盐调味捞出葱姜。汤清澈见底鲜到极致。
  prepTime: 20
  cookTime: 160
  constellationMessage:
    白羊座: "清汤越鸡看起来清淡但喝一口就被它的鲜味震撼了白羊觉得自己之前喝的都不叫鸡汤。"
    金牛座: "最简单的清炖却能吊出最醇厚的鸡鲜金牛对这种大道至简的烹饪哲学深表赞同。"
    双子座: "越鸡这个品种的名字来源于绍兴古称越国双子一边喝汤一边品味这道菜的历史底蕴。"
    巨蟹座: "清汤越鸡是绍兴最传统的一道汤菜巨蟹在冬日喝一碗从胃暖到心里。"
    狮子座: "整只鸡卧在清澈见底的汤中的画面简约而不简单狮子座认可这道菜低调的高级感。"
    处女座: "清汤要做到清澈见底需要文火慢炖且中途不能搅动处女座对这种精准的火候控制很佩服。"
    天秤座: "火腿的咸香与鸡肉的鲜甜在清汤中达成了完美的平衡天秤觉得这就是汤鲜的最高境界。"
    天蝎座: "清汤看似的简单之下是长达两三个小时的默默付出正如天蝎对每一件大事都倾注的全部心力。"
    射手座: "清汤越鸡是绍兴菜中最低调也最考验功力的一道射手在绍兴的老馆子里喝到了最难忘的一碗。"
    摩羯座: "一锅汤熬出来全家人都能享受到营养摩羯觉得这种长时间煲汤的方式就是最科学的家庭食补。"
    水瓶座: "清炖这种最古老的烹饪方式至今仍是最能体现食材本真的方法水瓶看到了传统烹饪中的科学智慧。"
    双鱼座: "清澈见底的汤面上飘着几朵油花的画面非常雅致双鱼在这碗汤里看到了江南菜最温柔的一面。"
  wuxingMessage:
    木: "香菇与冬笋的木香清新淡雅在清澈的汤中飘出最自然的山林气息。"
    火: "文火慢炖的火行温润绵长将整只鸡与火腿的精华缓缓释放到清澈的汤中。"
    土: "火腿的咸香土气经年沉淀为这碗清汤提供了最深沉的鲜味底蕴。"
    金: "白肉嫩滑金行清肃纯净以最本真的面貌呈现越鸡的极致鲜美。"
    水: "清汤水性最为丰沛纯净将飞禽与山珍的全部精华温柔地融为一碗。"

干菜焖肉:
  category: 浙菜
  flavors: [咸, 甜, 鲜]
  wuxingMatch: [木, 土]
  ingredients:
    - 五花肉 500g
    - 梅干菜 150g
    - 生抽 2大勺
    - 老抽 1大勺
    - 冰糖 30g
    - 料酒 2大勺
    - 姜片 葱段
  steps:
    - 梅干菜提前温水泡发20分钟洗净挤干切成碎末。五花肉切厚片焯水沥干。
    - 热锅少油下姜片葱段爆香加入五花肉片煸炒至出油表面微黄。
    - 加生抽老抽冰糖料酒翻炒上色放入梅干菜碎炒匀。
    - 加水刚没过食材大火烧开转小火慢焖1小时至肉片酥烂。
    - 转大火收干汤汁至梅干菜油亮肉片红润即可。
  prepTime: 25
  cookTime: 70
  constellationMessage:
    白羊座: "干菜焖肉的梅干菜吸收了肉油变得比肉还香白羊每筷子都忍不住夹一大撮。"
    金牛座: "梅干菜独特的咸香与五花肉的油脂结合堪称完美的味觉婚姻金牛对这种天作之合很欣赏。"
    双子座: "梅干菜的名字让双子好奇是什么菜经过腌制发酵和晒干三重变身变成了如此美味的干菜。"
    巨蟹座: "干菜焖肉是绍兴人走到哪里都忘不了的家乡味巨蟹在这道菜里吃到了妈妈厨房的味道。"
    狮子座: "黑亮的梅干菜和红润的五花肉交相辉映狮子座觉得这就是一道越吃越香的下饭神器。"
    处女座: "梅干菜要提前泡发去除多余的盐分和灰尘处女座对这个预处理的必要性表示完全理解。"
    天秤座: "梅干菜的咸香与五花肉的油脂形成了味道的完美互补天秤觉得这就是最经典的荤素搭配。"
    天蝎座: "梅干菜经过漫长的发酵和晒干才有如此复杂深邃的风味正如天蝎在时间淬炼下的深沉魅力。"
    射手座: "梅干菜焖肉和绍兴黄酒是天生一对射手在绍兴老街上边吃焖肉边喝黄酒是最惬意的江南时光。"
    摩羯座: "一次焖一大锅越热越好吃可以吃好几顿摩羯觉得这就是最划算的家庭备菜方案。"
    水瓶座: "利用干制发酵蔬菜来吸收鲜肉油脂的做法是一种古老的食材协同智慧水瓶对这种传统设计很着迷。"
    双鱼座: "梅干菜在焖煮中慢慢展开重现生机的过程很治愈双鱼在这道菜里看到了时间与食材的温柔对话。"
  wuxingMessage:
    木: "梅干菜经发酵和晒干后木气醇厚深远为闷煮的五花肉注入了最独特的植物芬芳。"
    火: "慢焖的火行温润持久将梅干菜的干香与五花肉的油脂一寸寸地融汇贯通。"
    土: "五花肉的厚实土气与梅干菜沉淀后的土气相互提升给你最深沉的味觉满足。"
    金: "冰糖炒色的金行利落干脆为焖肉披上诱人油亮的深红色泽。"
    水: "长时间焖煮的水性渗透滋润让干燥的梅干菜重新焕发生机变得柔软多汁。"

苔菜拖黄鱼:
  category: 浙菜
  flavors: [鲜, 咸, 甜]
  wuxingMatch: [水, 木]
  ingredients:
    - 小黄鱼 6条
    - 苔菜 50g
    - 面粉 100g
    - 淀粉 50g
    - 鸡蛋 1个
    - 泡打粉 1小勺
    - 盐 少许
    - 食用油 足量
  steps:
    - 小黄鱼去鳞去腮去内脏洗净从背部剖开去骨成两片鱼肉沥干。
    - 苔菜用剪刀剪成细碎末。面粉淀粉泡打粉盐混合加蛋液和适量水调成面糊。
    - 苔菜碎加入面糊中拌匀。鱼肉片均匀裹上苔菜面糊。
    - 锅中足量油七成热下鱼片中火炸至表面翠绿金黄浮起捞出控油。
    - 趁热食用苔菜的海洋清香和鱼肉的鲜甜在口中交融。
  prepTime: 25
  cookTime: 10
  constellationMessage:
    白羊座: "苔菜拖黄鱼外酥里嫩咬下去清香扑鼻白羊被这种来自海洋的独特味道征服了。"
    金牛座: "苔菜的清香和面糊的酥脆包裹着鲜嫩的黄鱼肉金牛觉得这是宁波最智慧的吃鱼方式。"
    双子座: "苔菜拖黄鱼的名字让双子很好奇原来是海苔碎拖在面糊里裹住黄鱼一起炸好有趣的做法。"
    巨蟹座: "苔菜拖黄鱼是宁波人从小吃到大的味道巨蟹在异乡吃到它时就像回到了宁波的海边。"
    狮子座: "翠绿色的苔菜面糊裹着金黄黄的鱼肉颜值非常独特狮子座对这种自带滤镜的炸物很满意。"
    处女座: "面糊的稠度要刚好能挂住鱼片又不至于太厚处女座对这种配比的精准把控很认可。"
    天秤座: "苔菜的植物清香与黄鱼的海洋鲜甜在油炸后达成了完美的味道联盟天秤无可挑剔。"
    天蝎座: "黄鱼藏在苔菜面糊的包裹之下等待被咬开后才发现其中的鲜美正如天蝎深藏的真实魅力。"
    射手座: "苔菜拖黄鱼是宁波独有的炸物料理射手在宁波的海鲜排档里吃到刚出锅的最是酥脆。"
    摩羯座: "用苔菜来增加炸物的风味层次是一种很聪明的做法摩羯觉得这就是低调但有内涵的美食创新。"
    水瓶座: "把海苔融入面糊中炸鱼的创意让海藻完成了跨界演出水瓶对这种海洋植物的开发利用很感兴趣。"
    双鱼座: "苔菜的翠绿色让双鱼想起了大海的颜色这道菜就像把一整个海洋的风味都裹进了面糊里。"
  wuxingMessage:
    木: "苔菜的海洋木香最为清新独特为你今日的味蕾带来来自东海的绿色芬芳。"
    火: "油炸的火行干脆炽烈将苔菜面糊炸得翠绿酥脆黄鱼炸得鲜嫩多汁。"
    土: "面糊的土气温和包容将苔菜的清与黄鱼的鲜牢牢锁在酥脆的外壳中。"
    金: "黄鱼去骨的精细金行利落干净将大海的鲜美以最纯粹的方式呈现。"
    水: "黄鱼生于东海水性最为鲜活在滚油的淬炼下依然保持最柔嫩的内在。"
