    金牛座: "鮸鱼肉手工搅打出的弹性质感让金牛惊艳，原来不添加任何化学物质也能做出如此弹牙的鱼丸。"
    双子座: "温州鱼丸不是圆的而是不规则的条状让双子觉得很特别，这就是温州鱼丸的独特个性。"
    巨蟹座: "一碗热气腾腾的温州鱼丸汤是巨蟹在异乡最想念的家乡味道，Q弹的鱼丸里满是对家乡的思念。"
    狮子座: "温州鱼丸虽然外表朴实但味道却毫不逊色于任何大菜，狮子座对它暗藏的实力表示认可。"
    处女座: "鱼肉泥要搅打上劲到足够弹性必须朝一个方向用力搅打，处女座对这种精确的操作手法很满意。"
    天秤座: "番薯粉与鱼肉的比例恰到好处既维持了弹性又不掩盖鱼鲜，天秤觉得这就是最理想的配比。"
    天蝎座: "一碗看似简单的鱼丸背后是温州人千锤百炼的手艺传承，正如天蝎深知所有表面轻松之下都有默默的努力。"
    射手座: "温州鱼丸是温州美食的头号代表，射手在温州的街头小店里吃到最地道的鮸鱼丸无比满足。"
    摩羯座: "鱼肉加番薯粉就是最简单的食材组合却能做出如此美味，摩羯看到了大道至简的智慧。"
    水瓶座: "温州鱼丸不规则的长条造型在鱼丸界独树一帜，水瓶对这种不随波逐流的个性表达很欣赏。"
    双鱼座: "鱼丸在清汤中漂浮的样子很治愈，双鱼喝一口汤咬一口鱼丸觉得生活就该是这样的温柔。"
  wuxingMessage:
    木: "葱姜末的辛香木气清新开胃，为你今日的味蕾吹来第一缕温州的清爽海风。"
    火: "煮丸的水火温润有序，在微沸中将鱼肉的鲜甜温柔地凝固为弹牙的形态。"
    土: "番薯淀粉的土气温和厚实赋予鱼丸独特的弹性质感和温饱能量。"
    金: "鮸鱼白肉金行清肃利落，以最纯粹的形态呈现海洋深处的鲜美。"
    水: "鱼生于海丸煮于水水性双重丰沛，将大海的鲜甜与番薯的温和融为一碗。"

咸菜黄鱼:
  category: 浙菜
  flavors: [酸, 鲜, 咸]
