    狮子座: "虽然是一道纯素菜但油焖春笋的浓郁鲜甜味道让狮子座刮目相看素菜也可以很有力量。"
    处女座: "笋要拍裂再切这样才能更好地吸收酱汁处女座对这种预处理的手法非常认可。"
    天秤座: "酱油的咸和冰糖的甜与春笋本身的鲜甜形成了三重甜的和谐递进天秤沉醉于此。"
    天蝎座: "春笋在地下默默积蓄了一整个冬天的能量春天破土而出展现惊人的生命力天蝎对这种厚积薄发的成长很有共鸣。"
