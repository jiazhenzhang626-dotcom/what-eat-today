    - 分次加入番薯淀粉继续搅打至鱼肉浆有弹性不粘手。
    - 大锅水烧开转小火保持微沸，用手抓起鱼肉浆从虎口挤出鱼丸用小勺刮入水中。
    - 鱼丸浮起后再煮2分钟至熟透。碗中加盐胡椒粉少许香醋舀入鱼丸和煮丸汤撒葱花即可。
