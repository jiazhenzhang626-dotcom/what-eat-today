葱包烩:
  category: 浙菜
  flavors: [咸, 鲜, 甜]
  wuxingMatch: [木, 土]
  ingredients:
    - 春卷皮或薄面饼 6张
    - 油条 2根
    - 小葱 1把
    - 甜面酱 适量
    - 辣酱 可选
    - 食用油 适量
