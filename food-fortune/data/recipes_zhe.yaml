    土: "糯米粉与黑芝麻的土气最为厚实甜蜜，给你最温暖最踏实的甜品滋养。"
    金: "石臼研碎芝麻的金行动作干脆利落，将坚硬的芝麻化为最细腻的温柔。"
    水: "水磨粉的原汤水性柔和温润，将糯米最本质的甜美送进你的口中。"

绍兴醉鸡:
  category: 浙菜
  flavors: [鲜, 咸, 甜]
  wuxingMatch: [金, 水]
  ingredients:
    - 三黄鸡 1只
    - 绍兴黄酒 1瓶
    - 高汤 1碗
    - 姜片 葱段
    - 盐 适量
    - 枸杞 1小撮
  steps:
    - 三黄鸡处理干净焯水捞出冲洗，再入锅加水姜片葱段煮至刚熟关火焖15分钟。
    - 捞出鸡立即浸入冰水至完全凉透使皮脆肉嫩，斩块码入深盘中。
    - 高汤烧开加盐调味放凉，混合等量的绍兴黄酒调成醉汁。
    - 醉汁浇入鸡块中至刚好没过，撒几粒枸杞入冰箱冷藏浸泡6小时以上入味。冷吃风味最佳。
  prepTime: 15
  cookTime: 40
  constellationMessage:
    白羊座: "绍兴醉鸡酒香扑鼻鸡肉冰凉滑嫩，白羊在夏天吃到这道冷菜时整个人都清爽了。"
    金牛座: "绍兴黄酒的醇厚酒香渗透到每一丝鸡肉中，金牛对这种用时间来入味的手法赞叹不已。"
    双子座: "醉鸡的名字让双子很好奇鸡是怎么醉的，原来是用黄酒浸泡让鸡肉吸收了酒的精华。"
    巨蟹座: "绍兴醉鸡是江南人夏天必备的冷盘之一，巨蟹在炎热的午后从冰箱里端出一盘就是最惬意的享受。"
    狮子座: "醉鸡码得整整齐齐鸡皮金黄酒香四溢，狮子座觉得这道冷菜的颜值和排面都属于上乘。"
    处女座: "醉汁的比例黄酒和高汤要一比一冰镇时间不能少于六小时，处女座对这些精确的参数很满意。"
    天秤座: "酒香与鸡鲜之间的比例恰到好处酒不压鲜鲜不盖酒，天秤觉得这就是醉菜的最高境界。"
    天蝎座: "醉鸡的精华在于醉汁在漫长时间中慢慢渗入鸡肉的耐心，正如天蝎愿意为值得的事付出等待。"
    射手座: "绍兴醉鸡是绍兴黄酒文化在餐桌上最生动的体现，射手边吃醉鸡边喝黄酒这才是最地道的绍兴体验。"
    摩羯座: "一道菜做好后可以冷藏保存好几天随吃随取，摩羯觉得这就是夏日最高效的蛋白质冷盘方案。"
    水瓶座: "用酒来醉泡食材的做法从古流传至今，水瓶对这种穿越千年的保存与调味一体的技术很感兴趣。"
    双鱼座: "鸡肉在琥珀色的醉汁中静静浸泡的画面让双鱼觉得很唯美，这是酒与肉之间最温柔的对话。"
  wuxingMessage:
    木: "枸杞的点缀木气轻盈，在酒香浓郁的鸡肉中跃出一抹红润的生机。"
    火: "煮鸡的温火恰到好处将其烫熟而不老，保留了鸡肉最原始的鲜嫩。"
    土: "鸡肉的鲜美土气温和细腻，在冰与酒的淬炼下展现出最柔韧的口感。"
    金: "冰水淬皮的金行瞬间收紧鸡肉，让鸡皮在醉汁中依然保持爽脆弹牙。"
    水: "黄酒与高汤双重水性浸润渗透，将酒之醇与肉之鲜温柔地融为醉人的一体。"

霉千张蒸肉:
  category: 浙菜
  flavors: [咸, 鲜, 甜]
  wuxingMatch: [土, 金]
  ingredients:
    - 霉千张 2张
    - 猪五花肉 200g
    - 姜丝 适量
    - 葱花 适量
    - 生抽 1大勺
    - 料酒 1大勺
    - 白糖 少许
  steps:
    - 五花肉切薄片加生抽料酒白糖抓匀腌15分钟。霉千张切成与肉片大小相近的片。
    - 盘中一层霉千张一层肉片交替叠放码成整齐的排列，最上层铺满姜丝。
    - 入蒸笼大火蒸30分钟至肉片酥烂出油霉千张吸满肉汁。
    - 出锅撒上葱花即可。霉千张吸取了肉油之后变得柔软鲜香别有一番风味。
  prepTime: 20
  cookTime: 30
  constellationMessage:
    白羊座: "霉千张蒸肉端上桌时那股浓郁的发酵香气让白羊觉得太特别了，原来发酵的味道可以如此迷人。"
    金牛座: "霉千张吸收了肉油的精华之后变得柔软鲜美，金牛对这个由丑变美的食材转变过程很着迷。"
    双子座: "霉千张这个名字就让双子很好奇，原来豆腐皮发霉之后还能做出如此美味的传统菜肴。"
    巨蟹座: "霉千张蒸肉是绍兴人最割舍不下的家乡味，巨蟹在这道菜里吃到了江南水乡最朴实的味道。"
    狮子座: "虽然霉千张外表朴素但蒸出来后整盘菜的层次分明相当好看，狮子座对它刮目相看。"
    处女座: "霉千张的发酵程度控制是关键霉得刚好才有独特风味不过头发苦，处女座对这种微妙的尺度把控很认可。"
    天秤座: "霉千张的韧与肉片的软形成了口感的完美互补，天秤享受这种刚柔并济的味觉平衡。"
    天蝎座: "霉千张外表不起眼却在蒸制后散发出惊人的鲜香，正如天蝎不张扬外表下的惊人魅力。"
    射手座: "霉菌发酵的食物在全球各地都有但在中国江南却是霉千张独树一帜，射手对这种地方性的发酵文化很感兴趣。"
    摩羯座: "霉千张和五花肉的组合成本不高却风味独特，摩羯觉得这就是最具性价比的特色家常菜。"
    水瓶座: "利用霉菌发酵来创造独特风味的做法与西方蓝纹芝士如出一辙，水瓶对这种跨文化发酵智慧的相似性很着迷。"
    双鱼座: "霉千张在蒸汽中慢慢吸收肉汁变得柔软的过程很治愈，双鱼看着蒸笼冒出的白汽就觉得温暖。"
  wuxingMessage:
    木: "姜丝与葱花的木香清新为这道发酵美食注入了一份清爽的平衡。"
    火: "蒸制的火行温润透骨将肉汁一寸寸逼出又被霉千张温柔地吸收。"
    土: "五花肉的丰腴土气厚实饱满为这道朴素的蒸菜提供了最踏实的能量。"
    金: "霉千张经发酵金行转化蜕变将平凡的豆腐皮升华为风味的精华载体。"
    水: "蒸汽氤氲水性渗透每个缝隙将肉之鲜与霉之香温柔地糅合为一体。"

温州鱼丸:
  category: 浙菜
  flavors: [鲜, 咸, 甜]
  wuxingMatch: [水, 金]
  ingredients:
    - 鮸鱼肉 500g
    - 番薯淀粉 100g
