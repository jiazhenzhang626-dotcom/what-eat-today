# 湘菜专辑 
# 字段与 recipes.yaml 完全一致，含完整星座/五行文案

剁椒鱼头:
  category: 湘菜
  flavors: [辣, 鲜, 麻]
  wuxingMatch: [水, 火]
  ingredients:
    - 胖头鱼头 1个
    - 剁椒 200克
    - 姜 1大块
    - 蒜 1整头
    - 豆豉 1大勺
    - 蒸鱼豉油 3大勺
    - 料酒 2大勺
    - 香葱 3根
    - 白糖 1小勺
    - 食用油 适量
  steps:
    - 鱼头从顶部劈开下颌相连，去鳃去黑膜洗净，用料酒和姜片抹匀腌15分钟。
    - 大碗底部铺上姜片，将鱼头展开鱼皮朝上架在碗上。
    - 剁椒拌入蒜末、豆豉、白糖和蒸鱼豉油，均匀铺满鱼头。
    - 蒸锅上汽后放入鱼头大火蒸10分钟，关火再虚蒸2分钟取出。
    - 倒掉多余汁水，撒上葱花，烧一勺滚油浇在剁椒上激出香味即可。
  prepTime: 20
  cookTime: 12
  constellationMessage:
    白羊座: "热情似火的白羊，今天这道剁椒鱼头能点燃你的味蕾，火红的剁椒就是你的本色。"
    金牛座: "醇厚鲜嫩的鱼头带着发酵的深远滋味，金牛会细细品尝这时间里沉淀的美味。"
    双子座: "一半剁椒一半酱椒的双色鱼头让双子感觉新奇，像体验一场味觉变奏曲。"
    巨蟹座: "一家人围坐分食一只大鱼头，巨蟹在热气腾腾中守护着最温暖的家庭时光。"
    狮子座: "硕大霸气的鱼头铺满红亮剁椒，狮子宴客时这道菜一上桌就是全场的焦点。"
    处女座: "去腥腌制的每一步都精准到位，处女座欣赏这种对细节的严谨态度。"
    天秤座: "鱼头的鲜美与剁椒的咸辣达成绝佳平衡，天秤享受着这份和谐的口感。"
    天蝎座: "剁椒鱼头外表热烈，内里藏着细腻的胶质，正如天蝎外冷内热的深情。"
    射手座: "从湖南火到全国的剁椒鱼头是冒险家的最爱，射手吃到额头冒汗才叫过瘾。"
    摩羯座: "按照传统步骤蒸出来的鱼头从不让人失望，摩羯相信经典就是最强的保障。"
    水瓶座: "用发酵辣椒来征服淡水鱼腥气是民间的大智慧，水瓶对这种智慧感到钦佩。"
    双鱼座: "鱼头里嫩滑的鱼脑像一泓温柔的泉水，双鱼闭上眼感受这份入口即化的缠绵。"
  wuxingMessage:
    木: "以剁椒之木行生发阳气，唤醒你沉睡的食欲，舒展身心。"
    火: "炽热的辣与滚烫的油浇灌出火行能量，为你的一天注入满满激情。"
    土: "长时间发酵的剁椒蕴含土行厚重，带来温润踏实的滋养力量。"
    金: "蒸制的清肃如金锋收敛浮火，让辣味变得通透不燥。"
    水: "鱼头深藏水中精气，为你补充智慧的源泉，清润滋养。"
辣椒炒肉:
  category: 湘菜
  flavors: [辣, 咸, 鲜]
  wuxingMatch: [火, 金]
  ingredients:
    - 猪前腿肉 300克
    - 青尖椒 200克
    - 蒜 5瓣
    - 豆豉 1小勺
    - 酱油 2大勺
    - 料酒 1大勺
    - 盐 适量
    - 食用油 适量
    - 白糖 半小勺
  steps:
    - 猪肉肥瘦分开切薄片，瘦肉用少许酱油和料酒抓匀腌制；青椒斜切成圈。
    - 干锅不放油，先下青椒圈加少许盐煸炒至起虎皮变软盛出。
    - 锅中放油，下肥肉片煸炒出油至微焦，再下瘦肉片滑炒至变色。
    - 放入拍碎的蒜瓣和豆豉炒香，沿锅边烹入酱油激出酱香。
    - 倒回青椒圈大火翻炒均匀，加白糖提鲜，翻匀即刻出锅。
  prepTime: 15
  cookTime: 10
  constellationMessage:
    白羊座: "辣椒炒肉的劲爆锅气让你热血沸腾，白羊的直爽豪迈都在这盘菜里了。"
    金牛座: "普普通通的辣椒和猪肉创造出惊艳美味，金牛相信这就是平凡生活的闪光点。"
    双子座: "辣椒炒肉可以下饭、可以拌面也可以夹馒头，百搭程度让双子特别满意。"
    巨蟹座: "这道菜是每个湖南伢子心中妈妈的味道，巨蟹吃一口就会想起家的温暖。"
    狮子座: "猛火快炒、大声吆喝上桌，狮子享受的就是这种大排档烟火气的排面。"
    处女座: "肉片厚度均匀、辣椒大小一致，处女座切菜时已经获得了内心秩序的平静。"
    天秤座: "青椒的清香和猪肉的荤香融合得恰到好处，天秤为这份平衡感到舒适。"
    天蝎座: "看似普通的家常菜其实最考验火候功力，天蝎懂得简单背后的深不可测。"
    射手座: "辣椒炒肉是湖南人的精神支柱，射手长途跋涉后用它回血满格。"
    摩羯座: "按部就班煸出油、煸干水汽，摩羯遵循古法做出来的就是最正宗的。"
    水瓶座: "先干煸辣椒再炒肉这种独特工序，水瓶觉得这里面藏着物理学的奥妙。"
    双鱼座: "油亮亮的辣椒炒肉盖在热米饭上，双鱼被这质朴的画面感动到了心底。"
  wuxingMessage:
    木: "青辣椒木行生生不息，为你疏解肝气，带来一天的爽朗。"
    火: "猛火煸炒的火行气势升腾，点燃你心中的奋斗之火。"
    土: "猪肉的肥甘入土补中益气，给忙碌的你一份厚实的安全感。"
    金: "煸炒逼出油脂是金行的削减之道，去除繁杂只留精华。"
    水: "烹入料酒如甘露洒下，水气蒸腾让菜肴温润不燥。"
东安子鸡:
  category: 湘菜
  flavors: [酸, 辣, 鲜]
  wuxingMatch: [木, 金]
  ingredients:
    - 嫩母鸡 半只
    - 嫩姜 100克
    - 红辣椒 50克
    - 米醋 80毫升
    - 花椒 20粒
    - 料酒 2大勺
    - 盐 适量
    - 淀粉 1大勺
    - 香葱 2根
    - 鸡汤 小半碗
  steps:
    - 鸡处理干净入沸水煮至七成熟捞出，晾凉后去骨切成长条。
    - 嫩姜切丝，红辣椒切丝，香葱切段。
    - 锅中放油，先下花椒粒小火炸香后捞出不要，再下姜丝和红椒丝煸香。
    - 倒入鸡条大火快炒，加入米醋、盐和料酒，翻炒让醋香渗入。
    - 加入鸡汤稍焖片刻，淋入水淀粉勾薄芡，撒葱段翻匀即可。
  prepTime: 25
  cookTime: 15
  constellationMessage:
    白羊座: "东安子鸡的酸辣如同当头一棒，瞬间唤醒白羊所有的感官激情。"
    金牛座: "用醋香来提鲜是古老的智慧，金牛细细品尝这道千年名菜的韵味。"
    双子座: "东安子鸡的酸辣鲜三重变奏，正如双子座今天多变又灵动的奇妙心境。"
    巨蟹座: "东安子鸡是湘菜之首，巨蟹愿意为亲友用心学做这道有分量的菜。"
    狮子座: "上桌时那股独特的醋香霸气四溢，狮子认为这就是领袖菜肴的气场。"
    处女座: "去骨切条必须大小均匀，处女座操练这道菜时耐心十足一丝不苟。"
    天秤座: "酸味和辣味的黄金比例让天秤座很享受，每一口都酸得刚刚好。"
    天蝎座: "东安子鸡的醋香深邃而悠长，就像天蝎的内心一样层层叠叠耐人寻味。"
    射手座: "这道菜源自湖南东安县，射手把它列入了潇湘游历的美食地图。"
    摩羯座: "传统名菜做法严谨用料考究，摩羯按照古方复原感到莫大的成就感。"
    水瓶座: "用米醋而不是陈醋，水瓶发现这细微的选择决定了整道菜的灵魂。"
    双鱼座: "嫩滑的鸡肉裹着微亮的芡汁，双鱼觉得这道菜温柔得像一首小诗。"
  wuxingMessage:
    木: "嫩姜与辣椒木气生发驱寒，帮你疏散一整天的紧绷。"
    火: "火热爆炒锁住鸡肉的鲜嫩，为你燃起生活的热情。"
    土: "鸡汤打底融入土德温厚，给你最踏实妥帖的脾胃抚慰。"
    金: "米醋的酸收敛金行主肃降，为你厘清思绪清爽通明。"
    水: "水煮后快炒保留鸡之本味，水行柔润智慧内蕴其中。"
腊味合蒸:
  category: 湘菜
  flavors: [咸, 鲜, 辣]
  wuxingMatch: [火, 土]
  ingredients:
    - 腊肉 200克
    - 腊鱼 150克
    - 腊肠 2根
    - 豆豉 1大勺
    - 干辣椒 5个
    - 姜 1块
    - 蒜 3瓣
    - 料酒 2大勺
    - 白糖 1小勺
    - 香葱 2根
  steps:
    - 腊肉、腊鱼、腊肠用温水洗净，腊肉腊肠切厚片，腊鱼斩块。
    - 将三样腊味分别焯水3分钟去咸，捞出沥干。
    - 取大碗，碗底铺姜片和拍蒜，将腊味码放整齐。
    - 上面撒豆豉、干辣椒段、白糖，淋入料酒。
    - 入高压锅隔水蒸25分钟，出锅倒扣盘中，撒葱花即可。
  prepTime: 20
  cookTime: 25
  constellationMessage:
    白羊座: "腊味合蒸揭开锅盖的瞬间香气扑鼻，白羊立刻食欲大开兴奋不已。"
