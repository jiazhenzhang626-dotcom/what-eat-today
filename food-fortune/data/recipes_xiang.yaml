    双子座: "三种不同腊味合在一起蒸，双子觉得像发现了味觉的三重奏。"
    巨蟹座: "腊味是年节才有的味道，巨蟹蒸上这道菜家里就有了过年的温暖。"
    狮子座: "满满一碗堆得冒尖的腊味彰显丰盛，狮子用这道硬菜款待贵客。"
    处女座: "腊味切片薄厚均匀、码放整齐，处女座对摆盘有着自己的执念。"
    天秤座: "咸香为主带一丝甜辣，天秤喜欢这种层次分明的味觉搭配。"
    天蝎座: "风干与熏烤让腊味有了复杂的风味深度，天蝎着迷于这种时间的魔法。"
    射手座: "腊味合蒸是湖南人家待客的至高铁律，射手去湖南旅行必尝此味。"
    摩羯座: "遵守传统的时间与工序才能做出好腊味，摩羯对老法子充满敬意。"
    水瓶座: "用蒸汽让腊味重回柔软，水瓶觉得这是逆向思维在厨房的应用。"
    双鱼座: "蒸得透亮的腊肉泛着琥珀色光泽，双鱼觉得这颜色美得如梦似幻。"
  wuxingMessage:
    木: "干辣椒与葱的木行点缀，为这道厚味带来生发的灵动。"
    火: "烟火熏制的火行印记深入腊味骨髓，点燃你内心的光明与热忱。"
    土: "腊味归土脾胃得养，用最质朴的咸香给你最踏实的能量。"
    金: "蒸制的金气清肃收降，化解腊味的燥气使之温润平和。"
    水: "隔水而蒸取水之柔情，让干硬的腊味重新柔软滋润。"
组庵豆腐:
  category: 湘菜
  flavors: [鲜, 咸]
  wuxingMatch: [土, 水]
  ingredients:
    - 嫩豆腐 1盒
    - 鸡肉 100克
    - 干贝 30克
    - 火腿 30克
    - 鸡蛋清 1个
    - 菜心 5颗
    - 清鸡汤 500毫升
    - 料酒 1大勺
    - 盐 适量
    - 淀粉 1大勺
  steps:
    - 豆腐捣碎过筛成细蓉，加入鸡肉剁成的细蓉、蛋清、盐和淀粉，顺一个方向搅打上劲。
    - 将豆腐蓉倒入抹了油的模具中，中火蒸20分钟成糕状，取出切成菱形块。
    - 干贝和火腿提前蒸软撕成丝。
    - 鸡汤加干贝丝、火腿丝和料酒煮开，轻轻滑入豆腐块小火煨10分钟。
    - 放入焯过水的菜心稍煮，调入薄芡，连汤带豆腐盛入深盘。
  prepTime: 40
  cookTime: 30
  constellationMessage:
    白羊座: "组庵豆腐看似清淡却能融化你的心，让白羊感受温柔也是一种力量。"
    金牛座: "用最繁复的工艺做一块豆腐，金牛对这种不惜工本的极致表示敬意。"
    双子座: "把豆腐做成糕再煨进鸡汤，双子觉得这样的套路很值得玩味。"
    巨蟹座: "这一碗鲜掉眉毛的豆腐羹汤，巨蟹捧在手心感受到深深的呵护。"
    狮子座: "组庵豆腐是官府湘菜的代表，狮子用它来匹配自己的高贵品味。"
    处女座: "豆腐蓉必须过筛三遍才够细腻，处女座享受这个追求完美的过程。"
    天秤座: "干贝火腿和鸡汤的咸鲜达到完美融合，天秤为这和谐滋味点赞。"
    天蝎座: "这道菜讲究吃鸡不见鸡、吃鲜不见鲜，天蝎喜欢这种藏而不露的深沉。"
    射手座: "组庵豆腐出自民国大厨，射手觉得吃这道菜像在品味一段传奇历史。"
    摩羯座: "每一步工艺都有板有眼程序严谨，摩羯认为只有规矩方能成就经典。"
    水瓶座: "把豆腐做出了高级感打破了固有认知，水瓶为这种颠覆性创意叫好。"
    双鱼座: "豆腐在鸡汤中轻轻飘动的样子太美了，双鱼觉得像一幅水墨小品。"
  wuxingMessage:
    木: "菜心木行青翠点缀，为这碗柔和带来盎然生机。"
    火: "文火慢煨的火行微温不熄，守护着那份绵长的鲜味。"
    土: "豆腐与鸡肉同属土行补中气，给你最温厚的脾胃养护。"
    金: "火腿的咸香金行肃降收敛，将诸鲜汇聚一处归于平和。"
    水: "清鸡汤的充沛水行精华，滋润你心田的每一处角落。"
毛氏红烧肉:
  category: 湘菜
  flavors: [甜, 咸, 鲜]
  wuxingMatch: [火, 土]
  ingredients:
    - 五花肉 600克
    - 冰糖 30克
    - 酱油 3大勺
    - 料酒 2大勺
    - 干辣椒 3个
    - 八角 2个
    - 桂皮 1小块
    - 姜 1块
    - 葱 2根
    - 盐 少许
  steps:
    - 五花肉整块冷水下锅煮至断生，捞出切成3厘米见方的块。
    - 锅中少油下冰糖小火炒成枣红色糖色，立即下入肉块翻炒上色。
    - 加入姜片、葱段、八角、桂皮和干辣椒炒香，烹入料酒和酱油。
    - 倒入没过肉块的开水，大火烧开转微火慢炖1小时。
    - 挑出香料，转大火收汁至浓稠油亮挂在每块肉上，出锅即成。
  prepTime: 15
  cookTime: 75
  constellationMessage:
    白羊座: "毛氏红烧肉红亮亮颤巍巍，让白羊瞬间充满能量和斗志。"
    金牛座: "入口即化的红烧肉是对舌头最大的犒赏，金牛细细享受这份入口的温柔。"
    双子座: "这道红烧肉不加一滴酱油老抽全凭糖色，双子觉得纯天然上色好神奇。"
    巨蟹座: "像东坡肉一样慢炖的红烧肉，巨蟹小火慢熬熬出了家的味道。"
    狮子座: "端上桌时那油亮红艳的光泽就是主角光环，狮子享用这道菜排面十足。"
