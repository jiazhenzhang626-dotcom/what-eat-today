  cookTime: 130
  constellationMessage:
    白羊座: "桂花糯米藕切面如梅花般精美的孔洞让白羊赞叹，原来莲藕的横截面可以这么美。"
    金牛座: "糯米和莲藕在红糖水中慢慢煮到软糯甜蜜，金牛觉得这就是最有耐心的甜品。"
    双子座: "把糯米塞进莲藕孔里的操作让双子觉得像在做手工，烹饪原来可以这样有趣。"
    巨蟹座: "桂花糯米藕是江南秋天最让人期待的甜品，巨蟹在桂花开的时候必定要做一次。"
    狮子座: "桂花糯米藕码盘后那精美的切面图案让狮子座爱不释手，这就是甜品的颜值天花板。"
    处女座: "糯米要塞满每个孔洞但不能太紧防煮后膨胀撑裂莲藕，处女座对这种恰到好处的填充手法很认可。"
    天秤座: "桂花香莲藕脆糯米软红糖甜四种感受在口中平衡演绎，天秤沉醉于这份甜品的层次之美。"
    天蝎座: "莲藕外表朴素内里却藏着晶莹的糯米心，正如天蝎不张扬的外表下闪闪发光的内在。"
