    摩羯座: "莲藕糯米红糖这三种基础食材做出了让人难以忘怀的美味，摩羯看到了大道至简的智慧。"
    水瓶座: "利用莲藕天然的孔洞结构来填充糯米的设计感十足，水瓶对这种顺应自然结构的烹饪思路很欣赏。"
    双鱼座: "干桂花撒在藕片上飘落的样子像极了金色的秋雨，双鱼在这道甜品里看到了江南秋天最浪漫的画面。"
  wuxingMessage:
