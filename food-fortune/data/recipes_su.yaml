    - 桂皮 1小块
    - 香叶 3片
    - 姜片 葱段
    - 料酒 2大勺
    - 食用明胶或琼脂 适量
  steps:
    - 猪蹄刮净焯水捞出。粗盐加花椒八角小火炒香成椒盐。
    - 椒盐均匀涂抹猪蹄内外按摩入味，冷藏腌制过夜。
    - 腌好的猪蹄冲洗表面椒盐，入锅加姜葱料酒和八角桂皮香叶，加水没过。
    - 大火烧开转小火煮2小时至猪蹄酥烂脱骨。取出猪蹄拆骨。
    - 煮猪蹄的原汤过滤去渣加明胶或琼脂加热融化。模具底层倒一层原汤凝固。
    - 将拆骨后的蹄肉铺入模具压紧，倒入剩余原汤没过蹄肉，冷藏凝固后切厚片。
