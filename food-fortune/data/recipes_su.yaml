    金: "油炸定型金行清肃干练，帮你在变局之中保持从容与坚定。"
    水: "炖煮时水分渗透入骨水性润泽，让每根排骨都酥软入味。"

扬州炒饭:
  category: 苏菜
  flavors: [咸, 鲜, 甜]
  wuxingMatch: [土, 金]
  ingredients:
    - 隔夜米饭 3碗
    - 虾仁 100g
    - 叉烧粒 100g
    - 鸡蛋 3个
    - 青豆 2大勺
    - 火腿粒 50g
    - 干贝丝 30g
    - 鸡腿肉 100g
    - 葱花 盐 食用油
  steps:
    - 虾仁鸡腿肉切粒码味滑油备用。鸡蛋打散。干贝提前泡发撕成丝。
    - 热锅多油倒入蛋液快速划散成碎粒，趁蛋未完全凝固倒入米饭。
    - 大火快速翻炒使每粒米饭都裹上蛋液呈金黄色粒粒分明。
