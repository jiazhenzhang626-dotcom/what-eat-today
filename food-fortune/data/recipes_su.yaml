    火: "慢煮两小时的火行温润甜美，将时间的味道缓缓注入莲藕的每一个孔洞。"
    土: "糯米与红糖土气双倍甜美厚实，给你最踏实最温暖的甜品滋养。"
    金: "莲藕孔洞结构金行清肃通透，帮你理清今日的思绪回归最通透的状态。"
