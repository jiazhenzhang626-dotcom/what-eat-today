# 苏菜专辑 —— 经典淮扬与江南风味
# 字段与 recipes.yaml 完全一致，含完整星座/五行文案

松鼠桂鱼:
  category: 苏菜
  flavors: [甜, 酸, 鲜]
  wuxingMatch: [水, 火]
  ingredients:
    - 桂鱼 1条
    - 番茄酱 4大勺
    - 白糖 3大勺
    - 白醋 2大勺
    - 淀粉 足量
    - 鸡蛋 1个
    - 松仁 1大勺
    - 青豆 1大勺
    - 姜丝 葱花 料酒 盐 食用油
  steps:
    - 桂鱼去鳞去腮去内脏洗净，切下鱼头，从背部沿脊骨两侧片开去骨，尾部相连。
    - 在鱼肉上剞十字花刀深至鱼皮但不切破，抹盐和料酒腌10分钟。
    - 鱼身裹蛋液再拍满干淀粉，使花刀散开呈松鼠尾状。鱼头同样裹粉。
    - 七成热油手提鱼尾将鱼肉翻卷朝下入锅炸定形，再整体入油炸至金黄酥脆，鱼头也炸熟装盘。
    - 另起锅少油下番茄酱白糖白醋小火炒浓，加青豆勾薄芡淋在鱼身上，撒松仁即可。
  prepTime: 30
  cookTime: 15
  constellationMessage:
    白羊座: "松鼠桂鱼酸甜酥脆一口惊艳，白羊被这道菜的视觉冲击力瞬间征服。"
