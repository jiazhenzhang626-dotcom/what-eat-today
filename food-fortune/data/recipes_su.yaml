    巨蟹座: "松鼠桂鱼是江南宴席上的重头戏，巨蟹在重要节日里总会点这道菜增添喜庆。"
    狮子座: "整条鱼如松鼠般跃然盘中的造型霸气十足，狮子座觉得这就是宴客的最高排面。"
    处女座: "十字花刀每一刀间距均匀深浅一致，处女座对这种极致的刀工表示肃然起敬。"
    天秤座: "酸甜酱汁的色泽红亮诱人比例完美，天秤觉得这就是视觉与味觉的双重享受。"
    天蝎座: "松鼠桂鱼看似华丽张扬实则做法极其严谨，正如天蝎外表张扬内里精细的个性。"
    射手座: "松鼠桂鱼是苏菜的代表作之一，射手把它列为江南美食之旅的必吃榜首。"
