炖生敲:
  category: 苏菜
  flavors: [咸, 鲜, 甜]
  wuxingMatch: [水, 土]
  ingredients:
    - 大黄鳝 500g
    - 猪五花肉 150g
    - 蒜瓣 1整头
    - 姜片 葱段
    - 生抽 2大勺
    - 老抽 1大勺
    - 冰糖 30g
    - 料酒 2大勺
    - 食用油 适量
  steps:
    - 鳝鱼烫去黏液去骨取肉，用木槌将鳝肉轻轻敲松敲薄敲大，切段。
    - 五花肉切厚片。蒜瓣整颗去皮保持完整。
    - 热锅多油六成热下敲好的鳝段炸至微黄捞出。再下五花肉煸至出油表面金黄。
    - 砂锅底部铺蒜瓣姜片葱段，放入炸过的鳝段和五花肉，加生抽老抽冰糖料酒。
    - 加开水没过食材，大火烧开转小火慢炖2小时至鳝段酥烂入口即化。
  prepTime: 30
  cookTime: 130
  constellationMessage:
    白羊座: "炖生敲中的鳝鱼经过捶打后变得无比酥烂，白羊觉得这就是以柔克刚的美食版。"
    金牛座: "两小时慢炖后的鳝段入口即化，金牛觉得时间赋予这道菜的温柔无可替代。"
    双子座: "炖生敲的名字让双子琢磨了半天，原来生敲是指用木槌将鳝鱼活生生敲打变大的工序。"
    巨蟹座: "炖生敲是南京最负盛名的传统菜之一，巨蟹在这道菜里品出了金陵古都的深沉底蕴。"
    狮子座: "五花肉和鳝鱼双主角的豪华阵容让狮子座很满意，这才是硬菜该有的分量。"
    处女座: "鳝鱼敲打的力度要恰到好处重了会碎轻了不蓬松，处女座对这种精确的力道控制表示佩服。"
    天秤座: "鳝鱼的鲜与五花肉的香在砂锅中交融得天衣无缝，天秤觉得这就是最理想的荤素搭配。"
    天蝎座: "鳝鱼经过敲打和慢炖后变得截然不同的口感如同蜕变，正如天蝎在时间沉淀中不断成长。"
    射手座: "炖生敲是金陵菜中的功夫之作，射手为了最正宗的味道愿意去南京的老字号一试。"
    摩羯座: "虽然炖制时间长但全程是砂锅在出力，摩羯觉得这种低干预的烹饪方法很适合日常工作日晚餐。"
    水瓶座: "用木槌敲打鳝鱼使其肉质蓬松的做法充满了动手实验的乐趣，水瓶对这种物理嫩肉法很感兴趣。"
    双鱼座: "鳝段在深色的汤汁中慢慢炖煮的画面让双鱼觉得很温暖，这就是时间与火候最温柔的合作。"
  wuxingMessage:
    木: "葱姜蒜的辛香木气去腥增香，为你今日的餐桌奠定清爽的基调。"
    火: "慢炖两小时的火行温润绵长，将鳝鱼的胶质与五花肉的油脂缓缓融合。"
    土: "五花肉的土气厚实丰腴，为整道菜提供了最可靠的风味地基。"
    金: "敲打鳝肉的金行动作利落有力，帮你击碎今日前行路上的障碍。"
    水: "鳝鱼生于水中水性最为充沛鲜嫩，为你补足今日的智慧与柔韧。"

金陵盐水鸭:
  category: 苏菜
  flavors: [咸, 鲜, 甜]
  wuxingMatch: [金, 水]
  ingredients:
    - 光鸭 1只
    - 粗盐 3大勺
    - 花椒 2大勺
    - 八角 3个
    - 桂皮 1块
    - 香叶 3片
    - 姜片 葱段
    - 料酒 2大勺
  steps:
    - 粗盐加花椒八角桂皮香叶小火炒至盐微黄出香成花椒盐。
    - 鸭子洗净沥干，将花椒盐均匀涂抹鸭身内外按摩入味，放冰箱腌制12小时。
    - 腌好的鸭子冲去表面的花椒盐。大锅水加姜片葱段料酒大火烧开。
    - 放入鸭子水重新烧开后转最小火，保持水面微沸不翻滚，浸煮40分钟。
    - 关火后鸭子继续在汤中浸泡30分钟至凉，捞出沥干斩块码盘。
  prepTime: 20
  cookTime: 70
  constellationMessage:
    白羊座: "金陵盐水鸭皮白肉红骨绿的精美卖相让白羊惊叹，原来一只鸭子可以这样精致。"
    金牛座: "盐水鸭吃的就是鸭肉本身的原味，金牛对这种返璞归真的烹饪理念深表赞同。"
    双子座: "盐水鸭的名字让双子以为会很咸结果却是恰到好处的咸鲜，这种反差很有意思。"
    巨蟹座: "金陵盐水鸭是南京人最引以为傲的美食名片，巨蟹每次去南京都要斩半只带回家。"
    狮子座: "整齐码放的白肉红骨切面精美如同工艺品，狮子座觉得这道菜的颜值无可挑剔。"
    处女座: "腌制的时间花椒盐的配比浸煮的水温每一步都精确把控，处女座对这种严谨的流程非常满意。"
    天秤座: "咸度刚好不淡不齁这就是千年传承下来的黄金咸度，天秤对这份恰到好处深以为然。"
    天蝎座: "鸭皮之下鸭肉暗藏清香鸭骨透出暗红，正如天蝎层层深入才得见的丰富内在。"
    射手座: "金陵盐水鸭有千年的制作历史，射手在南京品尝的时候仿佛在吃一块活的历史。"
    摩羯座: "一只盐水鸭做好后可以吃好多顿冷吃热吃皆宜，摩羯觉得这就是最高效的禽肉方案。"
    水瓶座: "传承千年的制作工艺至今未变，水瓶对这种穿越时间保持本真的美食传统充满敬意。"
    双鱼座: "盐水鸭切面那抹淡淡的胭脂红让双鱼很心动，原来鸭肉也可以如此浪漫。"
  wuxingMessage:
    木: "花椒八角的木香芬芳馥郁，为鸭肉注入了复杂而优雅的香气层次。"
    火: "炒椒盐的微火火行温而不烈，恰到好处地激活了所有香料的灵魂。"
    土: "粗盐的土气为最原始的调味之本，用最简单的方式锁住鸭肉的本真。"
    金: "白肉清肃金行最为纯净，帮你卸下今日的繁杂回归最简单的满足。"
    水: "浸煮的水性温和渗透鸭肉，让白肉在水的温柔怀抱中变得鲜嫩多汁。"

白汤鲫鱼:
  category: 苏菜
  flavors: [鲜, 咸, 甜]
  wuxingMatch: [水, 金]
  ingredients:
    - 鲫鱼 1条
    - 萝卜 半根
    - 姜片 5片
    - 葱段 2根
    - 料酒 2大勺
    - 猪油 1大勺
    - 盐 白胡椒粉
    - 香菜 适量
  steps:
    - 鲫鱼去鳞去腮去内脏洗净，在鱼身两面各划几刀。
    - 萝卜去皮切细丝。猪油入锅烧热下姜片爆香。
    - 鲫鱼入锅中小火两面各煎3分钟至微黄，加开水没过鱼身大火烧开。
    - 加葱段料酒转中大火持续滚煮15分钟至汤色奶白。
    - 下萝卜丝再煮5分钟至软，加盐白胡椒粉调味，撒香菜出锅。
  prepTime: 15
  cookTime: 25
  constellationMessage:
