清炖蟹粉狮子头:
  category: 苏菜
  flavors: [鲜, 咸, 甜]
  wuxingMatch: [水, 土]
  ingredients:
    - 五花肉 500g
    - 蟹粉 100g
    - 鸡蛋 1个
    - 淀粉 2大勺
    - 姜末 葱花
    - 料酒 盐 白胡椒粉
    - 清鸡汤 适量
    - 小油菜 4棵
  steps:
    - 五花肉先切片再切条最后切成石榴籽大小的细丁，不要剁成泥。
    - 肉丁加蟹粉姜末葱花鸡蛋淀粉料酒盐胡椒粉顺时针搅打上劲至起胶。
    - 双手沾水取肉馅团成大肉圆约拳头大小，在两手间反复摔打紧实。
    - 砂锅底铺几片白菜叶防粘，放入狮子头，沿锅边缓缓倒入清鸡汤至没过肉圆一半。
    - 大火烧开转最小的文火慢炖3小时至肉质酥烂。最后加焯过的小油菜即可。
  prepTime: 40
  cookTime: 190
  constellationMessage:
    白羊座: "狮子头名字霸气却口感温柔，白羊被这种名字与口感的强烈反差所震撼。"
    金牛座: "慢炖三小时后的狮子头入口即化，金牛觉得等待本身就是最奢侈的调味。"
    双子座: "肉要切成石榴籽大小的细丁而不是剁成泥，双子对这种精细的刀工要求非常好奇。"
    巨蟹座: "清炖蟹粉狮子头是淮扬菜的灵魂之作，巨蟹在它身上感受到了江南的温润与细腻。"
    狮子座: "狮子头与狮子座同名，今天这道菜就是为你量身定制的味觉加冕礼。"
    处女座: "肥瘦比例必须三肥七瘦分毫不差，处女座对这种精确到极致的要求心悦诚服。"
    天秤座: "蟹粉的鲜与猪肉的香完美平衡相辅相成，天秤在这颗狮子头里品出了和谐之道。"
    天蝎座: "看似粗犷的一颗大肉丸实则内藏蟹粉精华，正如天蝎低调外表下的丰富内在。"
    射手座: "狮子头是淮扬菜中名声最响的一道菜，射手为了最正宗的版本愿意专程去扬州。"
    摩羯座: "一颗狮子头有肉有蟹营养全面，摩羯觉得这就是最高效的蛋白质摄入方式。"
    水瓶座: "把一颗大肉丸命名为狮子头本身就是有趣的创意，水瓶喜欢这种豪气又不失幽默的命名。"
    双鱼座: "狮子头在清汤中慢慢炖煮的样子很治愈，双鱼在这道菜里看到了慢时光的美好。"
  wuxingMessage:
    木: "油菜点缀青翠木气清新，为你今日带来一抹生机与舒展。"
    火: "文火慢炖的火行温润绵长，将时间与耐心化作最柔软的力量。"
    土: "猪肉土气厚足扎实饱满，给你最深沉的身心滋养与满足。"
    金: "蟹粉的精华金行内蕴光芒，帮你展露今日最闪亮的一面。"
    水: "清鸡汤水性充沛融汇万物，将江海之鲜与陆地之香温柔融合。"

叫花鸡:
  category: 苏菜
  flavors: [鲜, 咸, 甜]
  wuxingMatch: [土, 火]
  ingredients:
    - 三黄鸡 1只
    - 荷叶 2张
    - 面粉 500g
    - 猪肉丝 100g
    - 冬笋 50g
    - 香菇 4朵
    - 姜片 葱段
    - 生抽 蚝油 料酒 盐 白糖
  steps:
    - 鸡处理干净用生抽蚝油料酒盐糖抹匀内外腌2小时。猪肉丝冬笋丝香菇丝炒香做填料。
    - 填料塞入鸡腹用竹签封口。荷叶泡软后将整鸡包裹两层，用棉线扎紧。
    - 面粉加水和白酒揉成面团擀成大圆皮，将荷叶包好的鸡完全包裹严实不留缝隙。
    - 烤箱预热180度放入面团包鸡烤2小时。出炉敲开面壳剥开荷叶，鸡肉酥烂香气喷薄而出。
  prepTime: 30
  cookTime: 130
  constellationMessage:
    白羊座: "敲开面壳的瞬间如同拆礼物般令人期待，白羊喜欢这种充满仪式感的用餐体验。"
    金牛座: "荷叶和面团两层包裹锁住了所有汁水和香气，金牛对这种古老烹饪智慧深表佩服。"
    双子座: "叫花鸡的名字背后是一个有趣的乞丐传说，双子对这道菜的历史故事特别着迷。"
    巨蟹座: "剥开荷叶时飘出的那股清香是叫花鸡的灵魂，巨蟹在这道菜里闻到了大自然的味道。"
    狮子座: "敲碎面壳露出一整只金黄酥烂的鸡就是全场最高潮，狮子座很享受这种戏剧性的上桌方式。"
    处女座: "面团包裹要做到完全密封不留缝隙才能锁住蒸汽，处女座对这种严密的工序要求很认可。"
    天秤座: "荷叶的清香与鸡肉的浓香形成层次分明的嗅觉体验，天秤欣赏这种自然的调味平衡。"
    天蝎座: "层层包裹之下的鸡才是真正的主角，正如天蝎需要在深入接触后才能看到真正的自己。"
    射手座: "叫花鸡是江南野外美食的传奇，射手对这种充满江湖气息的烹饪方式特别感兴趣。"
    摩羯座: "面团和荷叶虽然不能吃却起到了关键作用，摩羯觉得这就是工具的价值所在。"
    水瓶座: "用泥巴或面团裹住食材烤制是全人类的古老烹饪智慧，水瓶对这种跨文化的烹饪共性很着迷。"
    双鱼座: "荷叶的清雅香气让双鱼仿佛置身江南荷塘，这道菜本身就是一首可以吃的诗。"
  wuxingMessage:
    木: "荷叶的清香木气最为清新优雅，为你今日带来大自然最纯粹的芬芳。"
    火: "烘烤的火行渗透面壳均匀温和，将时间与热量化作酥烂的温柔力量。"
    土: "面壳包裹土行承载万物，为鸡肉提供了最安心的烘烤庇护所。"
    金: "敲开面壳的金行动作干脆利落，帮你打破今日的桎梏重获自由。"
    水: "荷叶包裹锁住水性不散，让鸡肉在烘烤中仍保持水润饱满。"

大煮干丝:
  category: 苏菜
  flavors: [鲜, 咸, 甜]
  wuxingMatch: [水, 金]
  ingredients:
    - 白干 4块
    - 熟鸡丝 100g
    - 熟火腿丝 50g
    - 虾仁 50g
    - 笋丝 50g
    - 豌豆苗 少许
    - 鸡汤 500ml
    - 盐 白胡椒粉 鸡油
  steps:
    - 白干劈成薄片再切成细丝，入沸水烫两次去除豆腥味沥干。
    - 砂锅中倒入鸡汤大火烧开，放入干丝、鸡丝、笋丝转小火煮10分钟。
    - 加火腿丝虾仁继续煮3分钟，加盐白胡椒粉调味。
    - 撒入豌豆苗淋少许鸡油即可上桌。汤清味鲜干丝绵软。
  prepTime: 25
  cookTime: 15
  constellationMessage:
    白羊座: "大煮干丝汤清味醇看似清淡实则鲜到极致，白羊喝了第一口就收起了对素菜的偏见。"
    金牛座: "把一块普通的白干劈成细丝需要的是耐心和刀功，金牛对这种化平凡为神奇的功夫很欣赏。"
    双子座: "白干切丝再煮的做法让双子觉得很有趣，原来豆腐干可以精细到这种程度。"
    巨蟹座: "一碗热腾腾的大煮干丝是最温柔的淮扬慰藉，巨蟹在微凉的夜晚最想念的就是这碗汤。"
    狮子座: "大煮干丝虽是素菜出身却用料讲究不输任何大菜，狮子座对它刮目相看。"
    处女座: "干丝要切得细如发丝根根均匀才合格，处女座对这种极致的刀工标准表示满意。"
    天秤座: "鸡汤清而不浊鲜美而不油腻，天秤觉得这就是汤品的黄金平衡点。"
    天蝎座: "清汤之下藏着鸡丝虾仁火腿的丰厚内涵，正如天蝎平静表面下汹涌的情感世界。"
    射手座: "大煮干丝是扬州早茶的经典之一，射手在扬州的清晨用这碗汤开启美好的一天。"
    摩羯座: "一把干丝几样配料煮出高级感，摩羯觉得这就是投入产出比最高的菜品。"
    水瓶座: "把豆腐干切成头发丝粗细的烹饪手法充满实验精神，水瓶对这种细节处的极致探索很着迷。"
    双鱼座: "干丝在清汤中如银丝般飘荡的意境很美，双鱼在这碗汤里看到了江南的婉约与温柔。"
  wuxingMessage:
    木: "豌豆苗青翠木气清新，为你今日的餐桌点缀一抹江南春色。"
    火: "鸡汤文火慢熬的火行温润持久，将各种食材的精华缓缓释放。"
    土: "白干作为豆制品土气温和朴实，给你一份最平易近人的滋养。"
    金: "鸡丝火腿丝金行清肃利落，帮你以最纯粹的方式获取优质蛋白。"
    水: "鸡汤水性丰沛融汇百味，将江鲜与家禽的精华温柔地糅合为一。"

糖醋排骨:
  category: 苏菜
  flavors: [甜, 酸, 咸]
  wuxingMatch: [木, 土]
  ingredients:
    - 猪小排 500g
    - 镇江香醋 3大勺
    - 白糖 3大勺
    - 生抽 1大勺
    - 老抽 半大勺
    - 料酒 1大勺
    - 姜片 3片
    - 食用油 足量
  steps:
    - 排骨斩小段冷水浸泡30分钟去血水沥干。入沸水焯烫捞出冲洗。
    - 锅中倒油六成热下排骨中火炸至表面微黄捞出控油。
    - 锅中留底油下姜片爆香，放入排骨加生抽老抽料酒翻炒上色。
    - 加没过排骨的开水和一半白糖大火烧开转小火炖40分钟至软烂。
    - 加香醋和剩余白糖转大火收汁，不停翻动至汤汁浓稠挂满每块排骨即可。
  prepTime: 40
  cookTime: 50
  constellationMessage:
