    金牛座: "猪油煎鱼再开水冲汤是白汤奶白的关键，金牛对这种烹饪技巧的讲究深感佩服。"
    双子座: "鱼煎过再加水汤就能变白这个化学反应让双子很感兴趣，烹饪中的科学真奇妙。"
    巨蟹座: "白汤鲫鱼是江南人家最家常的滋补汤，巨蟹在身体疲惫时最想念的就是这一碗。"
    狮子座: "奶白的鱼汤上飘着萝卜丝的画面清新雅致，狮子座觉得这碗汤的颜值同样值得称赞。"
    处女座: "煎鱼的火候要两面金黄不焦才能保证汤白不腥，处女座对这种细节的把控很认可。"
    天秤座: "鲫鱼的鲜与萝卜的清甜在奶汤中完美融合，天秤觉得这就是水陆食材合作的最佳范本。"
    天蝎座: "看似清澈的汤入口却是浓郁的鲜，正如天蝎表面平静下的波澜壮阔。"
    射手座: "白汤鲫鱼是太湖流域最家常却最难忘的味道，射手在太湖边的小馆子里喝到过最鲜的一碗。"
    摩羯座: "一条鲫鱼半根萝卜就熬出一锅营养丰富的汤，摩羯觉得这就是性价比最高的滋补方案。"
    水瓶座: "利用猪油煎鱼和滚水冲汤的物理原理来制作奶白汤，水瓶对这种经验科学很感兴趣。"
    双鱼座: "奶白色的鱼汤像是把月光倒进了碗里，双鱼在这碗汤里看到了最温柔的江南诗意。"
  wuxingMessage:
    木: "萝卜丝与香菜木气清新生发，为你今日的餐桌带来一份清爽的生机。"
    火: "煎鱼的火行精准利落，为奶白汤提供了最关键的风味前奏。"
    土: "猪油的醇厚土气为汤底提供了最可靠的风味地基。"
    金: "鲫鱼白肉金行清肃纯净，帮你回归最简单的味觉享受。"
    水: "鲫鱼生于淡水水性最为充沛鲜活，奶汤之中凝聚了江河的全部精华。"

桂花糯米藕:
  category: 苏菜
  flavors: [甜, 鲜, 咸]
  wuxingMatch: [木, 土]
  ingredients:
    - 莲藕 2节
    - 糯米 1碗
    - 红糖 100g
    - 冰糖 50g
    - 干桂花 2大勺
    - 红枣 6颗
    - 牙签 数根
  steps:
    - 糯米提前浸泡4小时沥干。莲藕去皮洗净在顶部切下一小段做盖子。
    - 将糯米用筷子慢慢填入莲藕的孔洞中填满但不压太紧。切下的藕盖用牙签固定回原位。
    - 填好的莲藕入大锅加水没过，放入红糖冰糖红枣大火烧开。
    - 转小火慢煮2小时至莲藕酥软汤汁浓稠。捞出放凉切片。
    - 切片码盘淋上煮藕的糖汁撒干桂花即可。
