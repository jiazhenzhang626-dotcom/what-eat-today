    水瓶座: "把一条鱼做成松鼠的造型需要超凡的想象力，水瓶对这种创意十足的烹饪手法很着迷。"
    双鱼座: "松鼠桂鱼如同盘中绽放的花朵美得让人不忍下筷，双鱼先要拍够照片才舍得吃。"
