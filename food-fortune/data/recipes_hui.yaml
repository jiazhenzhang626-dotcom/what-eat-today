    土: "豆腐发酵的土气厚重深沉，把平凡大豆转化成独特滋味。"
    金: "利落的翻面与调味金行清决，助你果断处理今天的微小杂事。"
    水: "少许清水煮汁的水气滋润，让你在品尝时获得柔和的涵养。"

问政山笋:
  category: 徽菜
  flavors: [鲜, 咸]
  wuxingMatch: [木]
  ingredients:
    - 问政山鲜笋 2根
    - 火腿 30g
    - 香葱 2根
    - 盐 少许
    - 白糖 1小撮
    - 食用油 1大勺
  steps:
    - 鲜笋剥去外壳，削去老根，切成滚刀块，火腿切薄片，香葱切段。
    - 烧一锅水，加入少许盐，放入笋块焯水2分钟去除涩味，捞出沥干。
    - 炒锅倒油烧热，下火腿片煸至透明出香。
    - 倒入笋块翻炒均匀，加盐和白糖调味，淋入小半碗清水。
    - 盖上锅盖焖煮3分钟，让笋吸入火腿的咸鲜。
    - 开盖收干汤汁，撒入葱段翻匀即可出锅。
  prepTime: 10
  cookTime: 10
  constellationMessage:
    白羊座: "清鲜爽脆的春笋带来直截了当的满足，白羊嚼得满口生津。"
    金牛座: "来自问政山的时令珍馐，金牛细品这大地馈赠的原味甘甜。"
    双子座: "笋与火腿的简单搭配竟如此出彩，双子对这道菜的鲜活灵气着迷。"
    巨蟹座: "带着山林清气的炒笋，让巨蟹仿佛闻到雨后竹林的气息，舒心惬意。"
    狮子座: "最质朴的食材成就不凡之味，狮子明白真正的好味无需复杂粉饰。"
    处女座: "笋块切得大小均匀，焯水时间精准，处女座对这份讲究十分认可。"
    天秤座: "咸与鲜之间的清爽平衡感，正是天秤今天追求的味觉审美。"
    天蝎座: "笋的鲜甜藏在层层笋衣深处，只有用心咀嚼的天蝎才能全盘领会。"
    射手座: "只有这个季节才能尝到的限定美味，射手迫不及待踏上寻鲜之旅。"
    摩羯座: "从剥壳到切块每一步都要亲手料理，摩羯享受这踏实的过程。"
    水瓶座: "用最简方式凸显山笋本味，水瓶觉得这种减法烹饪充满智慧。"
    双鱼座: "入口的清甜仿佛山泉流过，双鱼在鲜嫩里感受到春天的温柔。"
  wuxingMessage:
    木: "山笋纯然的木气生发充盈，助你今日舒展身心轻快向上。"
    火: "快炒的火行瞬间激发清香，为你带来清晨露珠般的活力。"
