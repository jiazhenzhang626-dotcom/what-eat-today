# 徽菜专辑 —— 25道经典安徽风味
# 字段与 recipes.yaml 完全一致，含完整星座/五行文案

臭鳜鱼:
  category: 徽菜
  flavors: [咸, 鲜, 辣]
  wuxingMatch: [水, 火]
  ingredients:
    - 腌制臭鳜鱼 1条
    - 五花肉 50g
    - 姜 1块
    - 蒜 5瓣
    - 干辣椒 5个
    - 料酒 2大勺
    - 生抽 2大勺
    - 老抽 1小勺
    - 白糖 1小勺
    - 香葱 2根
    - 食用油 适量
  steps:
    - 臭鳜鱼洗净，在鱼身两面各划几刀，用厨房纸吸干水分。
    - 五花肉切薄片，姜切片，蒜拍碎，干辣椒剪段，香葱切段。
    - 锅烧热倒油，放入五花肉片煸至出油微焦，下姜蒜干辣椒炒香。
    - 轻轻放入臭鳜鱼，中火煎至两面微黄，淋入料酒去腥。
    - 加入生抽老抽白糖，倒入没过鱼身一半的开水，大火烧开后转小火焖15分钟。
    - 开盖转大火收汁，汤汁浓稠时撒葱段，轻轻盛出装盘即可。
  prepTime: 10
  cookTime: 25
  constellationMessage:
    白羊座: "热情似火的白羊，今天这道臭鳜鱼能点燃你的味蕾，在发酵的异香中释放豪情。"
    金牛座: "这道需要耐心烹制的鳜鱼，让金牛在慢火细焖中品出时光凝练的醇美。"
    双子座: "闻着臭吃着香的奇妙反差，像极了双子令世界琢磨不透的趣味灵魂。"
    巨蟹座: "带着独特家味的炖鱼，令巨蟹想起最熟悉的灶火气息，心生妥帖暖意。"
    狮子座: "整鱼端上桌的霸气，正如狮子掌控全场的风范，这道硬菜足以镇住四方。"
    处女座: "煎鱼时每一面的火候都必须均匀完美，处女座对这种精准控制心领神会。"
    天秤座: "咸鲜微辣之间的分寸被拿捏得恰到好处，天秤欣赏这份味觉的优雅平衡。"
    天蝎座: "臭鳜鱼深藏的复杂香气层层递进，只有天蝎才能品出这般隐秘的诱惑。"
    射手座: "徽州深巷里的神奇风味，射手要把它列入人生必尝的美食冒险清单。"
    摩羯座: "用时间去完成风味的转化，摩羯深知只有耐心等待才会有惊艳登场。"
    水瓶座: "打破常规的发酵工艺赋予鱼肉全新生命，水瓶为这种创举鼓掌叫好。"
    双鱼座: "鱼肉入口的柔嫩仿佛在舌尖融化，双鱼在温存滋味里找到温柔乡。"
  wuxingMessage:
    木: "葱蒜点缀的木气轻轻升发，为今天注入一份灵动的生机。"
    火: "煎鱼的火行将表皮煸出焦香，锁住饱满的鲜美能量。"
    土: "酱汁收浓的土气醇厚如大地，带来踏实温润的抚慰。"
    金: "鱼身剞刀的利落金行帮你梳理心绪，回归从容条理。"
    水: "鳜鱼携丰沛水气而来，滋养你的智慧与深沉感知力。"

胡适一品锅:
  category: 徽菜
  flavors: [咸, 鲜]
  wuxingMatch: [土, 金]
  ingredients:
    - 土鸡 半只
    - 猪五花肉 200g
    - 鸭蛋 6个
    - 油豆腐 200g
    - 干豇豆 1把
    - 冬笋 1根
    - 香菇 6朵
    - 火腿 50g
    - 姜 1块
    - 盐 适量
    - 料酒 2大勺
  steps:
    - 土鸡和五花肉焯水洗净，干豇豆提前泡发，冬笋切片，香菇去蒂，火腿切片，鸭蛋煮熟去壳。
    - 取大号砂锅，底层铺干豇豆，再依次码入鸡块、五花肉、冬笋、香菇、油豆腐和火腿。
    - 最上层摆入去壳的鸭蛋，放姜片，淋料酒，注入清水至刚好没过食材。
    - 大火烧开撇净浮沫，转文火慢炖两小时，期间尽量不揭盖。
    - 炖至鸡肉酥烂、汤汁乳白，加盐调味，原锅端上桌即可。
  prepTime: 30
  cookTime: 120
  constellationMessage:
    白羊座: "层层叠叠的丰盛一锅炖，白羊被这直白的豪气招待激得胃口大开。"
    金牛座: "文火慢炖出的醇厚汤头，金牛捧着碗细细感受时间赠予的温润。"
    双子座: "一锅里藏着鸡猪蛋笋种种惊喜，双子觉得这像在寻宝，每一筷都新鲜。"
    巨蟹座: "像家人围坐分享的团圆砂锅，巨蟹能从中吃出最家常的温暖情意。"
    狮子座: "汇聚山海之味的丰盛一品锅，狮子用它宴请宾客倍觉面上有光。"
    处女座: "食材码放遵循严格的层次顺序，处女座对这种条理分明的烹饪表示满意。"
    天秤座: "各种食材的味道和谐交融又各自鲜明，天秤称赞这平衡的搭配美学。"
    天蝎座: "砂锅深藏的美味全在掀盖一瞬爆发，正如天蝎暗自酝酿的无穷力量。"
    射手座: "胡适先生钟爱的家乡味道，射手追随大师脚步在徽州找到这锅鲜。"
    摩羯座: "看似朴素却每层都有扎实功夫，摩羯明白好味道没有捷径只有用心。"
    水瓶座: "将不同食材放在一锅共融共创，水瓶欣赏这打破界限的融合思维。"
    双鱼座: "汤白如奶肉烂如泥的温柔，让双鱼喝下一口便泛起幸福的迷糊。"
  wuxingMessage:
    木: "冬笋与干豇豆携山野木气舒展，助你今日充满新生向上的力量。"
    火: "灶上文火不熄将火气徐徐送入，转化出最抚人心的脂香暖意。"
    土: "砂锅炖煮的厚土之德包裹所有滋味，给你稳稳当当的滋养。"
    金: "火腿与白肉的金行清肃生津，理清纷乱思绪收获内心安定。"
    水: "清泉作底的汤水润泽如流，为你补足今日所需的柔和智慧。"

毛豆腐:
  category: 徽菜
  flavors: [咸, 鲜]
  wuxingMatch: [土, 金]
  ingredients:
    - 毛豆腐 8块
    - 蒜 3瓣
    - 辣椒酱 1大勺
    - 生抽 1大勺
    - 香葱 2根
    - 食用油 适量
  steps:
    - 毛豆腐长满白色菌丝为佳，无需清洗，轻轻取出保持完整。
    - 平底锅倒油烧至五成热，将毛豆腐小心码入锅中，中小火慢煎。
    - 煎至底部金黄翻面，再煎另一面至金黄，表面菌丝会形成薄脆外壳。
    - 蒜切末，用锅中余油炒香蒜末和辣椒酱，加入生抽和少量清水调成酱汁。
    - 将酱汁浇在煎好的毛豆腐上，撒上葱花即可盛盘。
  prepTime: 5
  cookTime: 15
  constellationMessage:
    白羊座: "毛豆腐的浓烈个性让白羊一尝倾心，酥脆与柔嫩在口中痛快碰撞。"
