黄山毛峰虾仁:
  category: 徽菜
  flavors: [鲜, 咸]
  wuxingMatch: [水, 木]
  ingredients:
    - 鲜虾仁 200g
    - 黄山毛峰茶叶 1大勺
    - 鸡蛋清 半个
    - 盐 适量
    - 料酒 1小勺
    - 淀粉 1小勺
    - 食用油 适量
  steps:
    - 虾仁开背去虾线，用盐、料酒、蛋清和淀粉抓匀上浆，冷藏15分钟。
    - 毛峰茶叶用80度热水冲泡开，取茶汤和泡开的茶叶备用。
    - 炒锅倒油烧至五成热，下虾仁滑炒至变红蜷曲，盛出控油。
    - 锅中留底油，倒入适量茶汤，加少许盐，煮沸后淋入薄芡。
    - 倒回虾仁快速翻匀，撒入泡开的茶叶，即刻装盘。
  prepTime: 20
  cookTime: 8
  constellationMessage:
