砂锅鳝鱼:
  category: 徽菜
  flavors: [咸, 鲜, 辣]
  wuxingMatch: [水, 土]
  ingredients:
    - 黄鳝 300g
    - 五花肉 50g
    - 蒜 1整头
    - 姜 1块
    - 干辣椒 3个
    - 生抽 2大勺
    - 老抽 1小勺
    - 料酒 2大勺
    - 白糖 1小勺
    - 青红椒 各半个
    - 葱 2根
  steps:
    - 鳝鱼处理干净切段，五花肉切片，蒜剥皮，姜切片，青红椒切块。
    - 砂锅烧热倒少许油，下五花肉片煸至出油，再下蒜粒姜片干辣椒爆香。
    - 放入鳝段翻炒至变色，淋入料酒生抽老抽白糖炒匀。
    - 加入热水至刚刚没过鳝鱼，大火烧开后转小火焖20分钟。
    - 开盖放入青红椒块，大火收汁，汤汁浓稠时撒葱段即可。
  prepTime: 15
  cookTime: 30
  constellationMessage:
