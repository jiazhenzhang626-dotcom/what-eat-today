黄山炖鸽:
  category: 徽菜
  flavors: [鲜, 咸]
  wuxingMatch: [金, 水]
  ingredients:
    - 乳鸽 1只
    - 黄山石耳 20g
    - 火腿 20g
    - 姜 3片
    - 料酒 1大勺
    - 盐 适量
    - 枸杞 10粒
  steps:
    - 乳鸽处理干净，去爪去尾，斩成大块，冷水下锅加姜片料酒焯水，捞出洗净。
    - 石耳提前用温水泡发，搓洗干净泥沙，撕成小片；火腿切片。
    - 将鸽块、石耳、火腿、姜片放入炖盅，加足量清水。
    - 炖盅加盖放入蒸锅，隔水炖2小时，或用炖锅小火慢炖。
    - 出锅前10分钟撒入枸杞，加盐调味即可。
  prepTime: 20
  cookTime: 120
  constellationMessage:
    白羊座: "清澈透亮的炖鸽汤让白羊一饮而尽，从头暖到脚活力全开。"
    金牛座: "隔水慢炖出的极致清鲜，金牛捧着炖盅感受每一口的细腻甘醇。"
    双子座: "石耳与鸽肉的有趣组合，让双子对这道古老汤品生出许多好奇。"
    巨蟹座: "一盅温润的炖汤，像极了家人默默端来的关怀，巨蟹的心瞬间柔软。"
    狮子座: "用简洁的工序做出贵气十足的汤品，狮子觉得这正是低调的奢华。"
    处女座: "汤面不见一丝浮油，纯净得完美无瑕，处女座对这盅汤无可挑剔。"
    天秤座: "鸽肉与石耳在汤中展现的和谐之美，天秤从中品出优雅的滋味。"
    天蝎座: "石耳生长在黄山的峭壁之上，天蝎觉得这汤里藏着山岩的坚毅。"
    射手座: "去黄山不仅要看云海，射手还想在山脚下喝一碗地道的炖鸽。"
    摩羯座: "两小时的漫长炖煮考验着耐心，摩羯知道时间终会交出完美答卷。"
    水瓶座: "将山间石耳与鸽肉共冶一炉，水瓶欣赏这种源于自然的搭配巧思。"
    双鱼座: "汤的温润滑过喉咙像一句轻声安慰，双鱼在这柔和中放下疲惫。"
  wuxingMessage:
    木: "枸杞最后的木气点睛，为你的今日增添一抹红润的好气色。"
    火: "持续滚烫的蒸汽火行包裹炖盅，将营养缓缓逼入汤中。"
    土: "炖盅的土德收纳所有精华，给你一份凝练踏实的滋养。"
    金: "鸽肉与火腿的白肉金行养阴清肺，帮你理顺呼吸与节奏。"
    水: "清澈汤水如泉润泽，为你补足今天所需的深沉感知力。"

符离集烧鸡:
  category: 徽菜
  flavors: [咸, 鲜]
  wuxingMatch: [金, 火]
  ingredients:
    - 三黄鸡 1只
    - 麦芽糖 2大勺
    - 生抽 3大勺
    - 老抽 1大勺
    - 料酒 2大勺
    - 花椒 1小勺
    - 八角 2个
    - 桂皮 1小段
    - 香叶 3片
    - 姜 1块
    - 葱 3段
    - 盐 适量
    - 食用油 足量
  steps:
    - 鸡处理干净，用盐和花椒在鸡身内外搓匀，腌制4小时。
    - 大锅烧水，加入生抽老抽料酒八角桂皮香叶姜葱煮成卤水。
    - 麦芽糖用少许温水化开，均匀涂抹在腌好的鸡身表面，晾干。
    - 锅中宽油烧至六成热，手提鸡颈用勺舀热油不断淋在鸡身，至表皮金黄红亮。
    - 将炸上色的鸡放入卤水锅中，大火烧开转小火卤1小时，关火后在卤汁中浸泡30分钟。
    - 捞出沥干，切块装盘，浇上少许卤汁即可。
  prepTime: 240
  cookTime: 90
  constellationMessage:
    白羊座: "色泽红亮的烧鸡散发诱人焦香，白羊扯下鸡腿大口吃肉的豪情瞬间点燃。"
    金牛座: "老卤慢浸让每一丝鸡肉都入味至骨，金牛细嚼这经典味道满足点头。"
    双子座: "先炸后卤的复杂工艺让双子充满好奇，一块鸡肉吃出层层递进的香气。"
    巨蟹座: "烧鸡是家中过节才有的隆重美味，巨蟹吃着它便想起团圆的日子。"
    狮子座: "整鸡上桌的气势足以镇住全场，狮子认为请客就该如此排面十足。"
    处女座: "从腌渍到淋油的每道工序都有严格时间，处女座满意这精准的操作。"
    天秤座: "咸鲜卤香与肉香的比例协调得无可挑剔，天秤享受这份平衡的味觉。"
