烧鹅:
  category: 粤菜
  flavors: [咸, 鲜, 甜]
  wuxingMatch: [火, 金]
  ingredients:
    - 整鹅 1只
    - 五香粉 2大勺
    - 柱侯酱 2大勺
    - 海鲜酱 2大勺
    - 麦芽糖 3大勺
    - 白醋 2大勺
    - 蒜末 姜末 盐 白糖 料酒
  steps:
    - 鹅处理干净沥干。五香粉盐糖蒜姜末柱侯酱海鲜酱混合涂抹鹅腹内，用竹签封口。
    - 用气泵或吸管从鹅颈皮口吹气使皮肉分离，淋滚水使鹅皮收紧。
    - 麦芽糖加白醋调成脆皮水，均匀刷在鹅皮上，挂通风处晾干4小时以上。
    - 烤箱预热200度，鹅胸朝上烤30分钟，翻面再烤30分钟至皮色金红油亮。
    - 取出斩块码盘。烤鹅过程中滴下的鹅汁加少许水煮开做成蘸汁。
  prepTime: 30
  cookTime: 60
  constellationMessage:
    白羊座: "金红油亮的烧鹅一出炉就让人热血沸腾，白羊二话不说先夹最大的那只腿。"
    金牛座: "脆皮下那层丰腴的鹅脂入口即化，金牛觉得这是整只烧鹅最精华的部分。"
    双子座: "烧鹅的皮脆肉嫩骨香三重奏让双子应接不暇，每一口都是不同的味觉体验。"
    巨蟹座: "一只烧鹅是广东家庭加菜的最高礼仪，巨蟹在过节时总会买一只回家分享。"
