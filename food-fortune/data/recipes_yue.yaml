煲仔饭:
  category: 粤菜
  flavors: [咸, 鲜, 甜]
  wuxingMatch: [土, 火]
  ingredients:
    - 大米 2杯
    - 腊肠 2根
    - 腊肉 100g
    - 青菜 3棵
    - 姜丝 适量
    - 生抽 2大勺
    - 老抽 半大勺
    - 蚝油 1大勺
    - 白糖 少许
    - 食用油 1大勺
  steps:
    - 大米淘洗后加水浸泡30分钟。腊肠腊肉切薄片。青菜焯水备用。
    - 砂锅底部抹一层薄油，倒入泡好的米和适量水，大火煮开后转小火。
    - 煮至米饭表面水快干时铺上腊肠腊肉和姜丝，盖上锅盖小火焖10分钟。
    - 沿着锅边淋一圈食用油，继续小火焖5分钟使锅底形成金黄锅巴。
    - 调煲仔汁：生抽老抽蚝油白糖混合。开盖淋汁放入青菜，拌匀即食。
  prepTime: 35
  cookTime: 25
  constellationMessage:
