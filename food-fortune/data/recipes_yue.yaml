蚝油生菜:
  category: 粤菜
  flavors: [鲜, 咸, 甜]
  wuxingMatch: [木, 水]
  ingredients:
    - 生菜 2棵
    - 蚝油 1.5大勺
    - 生抽 半大勺
    - 蒜末 1大勺
    - 白糖 少许
    - 淀粉 1小勺
    - 食用油 1大勺
    - 盐 少许
  steps:
    - 生菜掰开叶片洗净。大锅水烧开加少许盐和几滴油，下生菜烫10秒立即捞出沥干装盘。
    - 小碗中蚝油生抽白糖淀粉加3大勺清水调成蚝油芡汁。
    - 热锅少油下蒜末小火炒至金黄，倒入蚝油芡汁小火搅拌至浓稠冒泡。
    - 将芡汁均匀淋在焯好的生菜上即可。蚝油的鲜和生菜的脆是天作之合。
  prepTime: 5
  cookTime: 5
  constellationMessage:
