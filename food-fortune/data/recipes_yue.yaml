干炒牛河:
  category: 粤菜
  flavors: [咸, 鲜, 甜]
  wuxingMatch: [土, 火]
  ingredients:
    - 河粉 500g
    - 牛肉 200g
    - 绿豆芽 1把
    - 韭黄 3根
    - 洋葱 半个
    - 生抽 2大勺
    - 老抽 1大勺
    - 蚝油 1大勺
    - 淀粉 1大勺
    - 盐 白糖 食用油
  steps:
    - 牛肉切薄片加生抽淀粉腌15分钟。河粉撕散防粘连。豆芽韭黄洋葱切好备用。
    - 热锅多油滑炒牛肉至七成熟盛出。锅中再加油大火烧至冒烟。
    - 下河粉大火快速翻炒至微微焦黄，加生抽老抽蚝油白糖炒匀上色。
    - 下洋葱豆芽和牛肉大火翻炒，最后加韭黄翻几下出锅。全程大火是镬气的关键。
  prepTime: 20
  cookTime: 10
  constellationMessage:
    白羊座: "干炒牛河全程大火快炒干脆利落，正是白羊钟爱的做事风格。"
