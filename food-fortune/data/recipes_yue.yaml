双皮奶:
  category: 粤菜
  flavors: [甜, 鲜, 咸]
  wuxingMatch: [金, 土]
  ingredients:
    - 水牛奶 300ml
    - 鸡蛋清 2个
    - 白糖 3大勺
  steps:
    - 水牛奶加白糖小火煮至边缘冒泡不要沸腾，倒入碗中静置冷却至表面结出奶皮。
    - 用筷子轻轻拨开奶皮，将碗中牛奶倒出与蛋清混合搅匀。
    - 混合液沿碗边轻轻倒回碗中让奶皮浮在表面。加盖保鲜膜。
    - 小火慢蒸15分钟至凝固关火焖5分钟。冷藏后食用风味更佳。
  prepTime: 10
  cookTime: 25
  constellationMessage:
