    狮子座: "香气弥漫整间屋子的煲仔饭自带主角光环，狮子座很享受这种万众期待的感觉。"
    处女座: "煲仔饭的火候需要时大时小时而淋油，处女座对这种精细的火候管理极为欣赏。"
    天秤座: "腊味的咸香与米饭的清甜完美平衡，天秤觉得这就是最好的味觉组合。"
    天蝎座: "煲仔饭上层柔软底层焦脆，正如天蝎面冷心热的两面性各有魅力。"
