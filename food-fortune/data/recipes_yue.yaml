    狮子座: "翠绿的生菜淋上油亮的蚝油汁颜值在线，狮子座的餐桌上从不将就。"
    处女座: "焯水的十秒钟精确到秒不能多也不能少，处女座对这种分秒不差的时间管理表示认可。"
