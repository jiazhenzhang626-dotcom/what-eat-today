# 字段与 recipes.yaml 完全一致，含完整星座/五行文案

清蒸鲈鱼:
  category: 粤菜
  flavors: [鲜, 咸, 甜]
  wuxingMatch: [水, 金]
  ingredients:
    - 新鲜鲈鱼 1条
    - 姜 1块
    - 葱 2根
    - 蒸鱼豉油 2大勺
    - 料酒 1大勺
    - 盐 适量
    - 食用油 2大勺
  steps:
    - 鲈鱼去鳞去腮去内脏洗净，在鱼身两面各划三刀，抹盐和料酒腌10分钟。
    - 盘中铺姜片葱段，放上鲈鱼，鱼肚里也塞入姜葱。
    - 蒸锅水开后将鱼盘放入，大火蒸8-10分钟至鱼眼凸出肉色变白。
    - 取出倒掉盘中腥水，捡去蒸过的姜葱，铺上新鲜葱丝姜丝。
    - 小锅烧油至冒烟浇在葱姜丝上激香，沿盘边淋入蒸鱼豉油即可。
  prepTime: 15
  cookTime: 10
  constellationMessage:
