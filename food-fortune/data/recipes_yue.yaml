白切鸡:
  category: 粤菜
  flavors: [鲜, 咸, 甜]
  wuxingMatch: [金, 水]
  ingredients:
    - 三黄鸡 1只
    - 姜 1大块
    - 葱 3根
    - 沙姜 适量
    - 花生油 3大勺
    - 盐 适量
    - 冰水 1大盆
  steps:
    - 大锅水烧开加姜片葱结，手提鸡颈将鸡浸入沸水中烫10秒提起，重复三次使鸡皮收紧。
    - 将鸡完全浸入锅中，水重新烧开后关火，盖上锅盖浸泡25-30分钟。
    - 用筷子插入鸡腿最厚处无血水流出即熟，捞出立即浸入冰水至完全凉透。
    - 鸡斩块码盘。沙姜切末加盐淋入滚烫花生油做成蘸料，与姜葱油碟一同上桌。
