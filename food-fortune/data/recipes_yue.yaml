虾饺:
  category: 粤菜
  flavors: [鲜, 甜, 咸]
  wuxingMatch: [水, 金]
  ingredients:
    - 澄粉 150g
    - 生粉 50g
    - 鲜虾仁 300g
    - 肥猪肉 50g
    - 笋 50g
    - 猪油 1大勺
    - 盐 糖 白胡椒粉 香油
  steps:
    - 虾仁一半剁成泥一半切大粒，肥猪肉和笋切细丁。混合加盐糖胡椒粉香油猪油搅打上劲成虾饺馅。
    - 澄粉加生粉混合，冲入滚烫沸水快速搅拌成雪花状，趁热揉成光滑面团。
    - 面团搓条切剂子，用刀面压成薄而圆的饺皮。每个包入虾馅捏出弯月形褶皱。
    - 蒸笼铺胡萝卜片或油纸防粘，码入虾饺，大火蒸6-8分钟至皮透明。
  prepTime: 40
  cookTime: 8
  constellationMessage:
