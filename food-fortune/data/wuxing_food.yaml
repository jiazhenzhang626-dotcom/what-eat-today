# 五行与食物属性映射
# 用于八字调补推荐

木:
  描述: "木主生发，宜食酸味、绿色食物，如蔬菜、酸味水果"
  代表食物: [菠菜, 芹菜, 青菜, 柠檬, 猕猴桃]
  建议口味: [酸, 鲜]

火:
  描述: "火主炎上，宜食苦味、红色食物，如辣椒、番茄、红豆"
  代表食物: [辣椒, 番茄, 红豆, 红枣, 苦瓜]
  建议口味: [辣, 苦]

土:
  描述: "土主稼穑，宜食甘味、黄色食物，如南瓜、小米、土豆"
  代表食物: [南瓜, 小米, 土豆, 红薯, 玉米]
  建议口味: [甜, 咸]

金:
  描述: "金主肃降，宜食辛味、白色食物，如萝卜、洋葱、大蒜"
  代表食物: [萝卜, 洋葱, 大蒜, 白萝卜, 银耳]
  建议口味: [辣, 鲜]

水:
  描述: "水主润下，宜食咸味、黑色食物，如海带、黑豆、黑木耳"
  代表食物: [海带, 黑豆, 黑木耳, 黑芝麻, 紫菜]
  建议口味: [咸, 鲜]
