花生汤:
  category: 闽菜
  flavors: [甜]
  wuxingMatch: [土, 水]
  ingredients:
    - 花生仁 300克
    - 白砂糖 适量
    - 牛奶 1杯
    - 鸡蛋 2个
  steps:
    - 花生仁用开水浸泡10分钟，趁热脱去红衣成白花生仁，拣去坏果。
    - 将白胖花生仁放入砂锅，加足量清水，大火煮沸后转极小文火，盖盖慢熬。
    - 保持汤面微沸状态，熬煮2-3小时，直到花生仁彻底软烂酥透，汤色奶白。
    - 加入白砂糖和牛奶轻轻搅匀，再煮5分钟。
    - 鸡蛋打散成蛋液，关火后立刻将蛋液呈细线状淋入汤中，静置片刻形成美丽蛋花，轻轻搅动即可。
