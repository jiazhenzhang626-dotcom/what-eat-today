    - 海蛎 100克
    - 大蒜苗 3根
    - 白胡椒粉 盐 糖
    - 甜辣酱 海苔碎 贡糖
  steps:
    - 五花肉切细条，卷心菜、胡萝卜、豆腐干、泡发香菇全部切细丝，蒜苗切碎。
    - 热锅下油，先煸炒五花肉出油至微焦，再下香菇豆腐干炒香。
    - 倒入胡萝卜丝、卷心菜丝大火翻炒至变软，加入海蛎、豆芽、蒜苗，加盐糖胡椒粉调味炒匀，沥干多余汤汁成馅料。
    - 取一张春卷皮平铺，铺上一层炒好的馅料，撒上一点海苔碎。
    - 再放上一小勺甜辣酱和一小块捏碎的贡糖，卷紧成长条状封口处抹点水粘合。
    - 可以直接食用，也可入平底锅小火煎至外皮金黄酥脆。
