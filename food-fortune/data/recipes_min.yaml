    - 汤底中放入酸菜丝煮出酸味，再轻轻放入焯好的猪血块，小火煨煮15分钟让其入味。
    - 碗底放大量白胡椒粉和少许香油，将滚烫的猪血汤冲入碗中，撒上韭菜末即可。
