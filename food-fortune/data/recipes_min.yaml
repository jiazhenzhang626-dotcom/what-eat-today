芥菜饭:
  category: 闽菜
  flavors: [咸, 鲜]
  wuxingMatch: [木, 土]
  ingredients:
    - 晚米 2杯
    - 芥菜 1大棵
    - 猪五花肉 150克
    - 虾米 1把
    - 干香菇 5朵
    - 红葱头 5粒
    - 花生仁 1大勺
    - 酱油 2大勺
    - 猪油 盐
  steps:
    - 晚米洗净浸泡30分钟后沥干。芥菜洗净切碎，五花肉切小丁，香菇泡发切丁，红葱头切薄片。
    - 锅下猪油，小火将红葱头片炸至金黄酥脆捞出，成葱头酥。
    - 锅中葱油煸炒五花肉丁至出油微焦，再下香菇丁虾米炒香，倒入芥菜碎大火炒软。
    - 倒入沥干的米，加酱油和盐翻炒均匀，让每粒米都裹上油脂和酱色。
    - 将炒好的米料全部转入电饭煲或砂锅，加入平时煮饭等量的水（可略少），撒入花生仁。
    - 按下煮饭键，跳闸后再焖10分钟，开盖撒上葱头酥拌匀即可。
