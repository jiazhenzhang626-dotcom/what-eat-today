扳指干贝:
  category: 闽菜
  flavors: [鲜, 咸, 甜]
  wuxingMatch: [水, 土]
  ingredients:
    - 大干贝 12粒
    - 白萝卜 1个
    - 猪瘦肉 100克
    - 鸡汤 1碗
    - 葱段 姜片
    - 料酒 少许
    - 盐 糖
    - 水淀粉 适量
  steps:
    - 干贝提前用温水加姜片料酒泡发2小时，洗净后撕去老筋，加鸡汤上锅蒸30分钟至软烂。
    - 白萝卜去皮，横切成2厘米厚的圆形段，用小刀将中心挖空如扳指环状，放入盐水煮至半透明捞出。
    - 猪瘦肉剁成细茸，加少许盐糖搅打上劲，酿入萝卜环中填实，上嵌一粒蒸好的干贝。
    - 全部做好后摆盘，再入蒸笼大火蒸15分钟，取出滗出汤汁。
    - 滗出的汤汁加盐、糖调味，用水淀粉勾薄芡，均匀淋在每一个扳指上即可。
  prepTime: 40
  cookTime: 25
  constellationMessage:
    白羊座: "干贝嵌在萝卜环中形如古代扳指，白羊觉得这道菜吃起来有种英雄般豪情。"
    金牛座: "萝卜的清甜与干贝的鲜美完美交融，金牛慢慢咀嚼，品味这精雕细琢的工艺。"
    双子座: "把食材做成古代射箭扳指的形状，双子觉得这道菜的造型创意十分新奇有趣。"
    巨蟹座: "蒸出来的扳指干贝清鲜不油腻，是巨蟹为家人精心准备的那一抹温柔心意。"
    狮子座: "个个圆润饱满的扳指干贝摆盘气派，狮子座觉得这就是宴请贵客的高雅排面。"
    处女座: "每个萝卜环都挖得大小厚薄均匀，处女座对这种细致的做工表示肃然起敬。"
    天秤座: "红润干贝与半透明白萝卜色彩搭配雅致，天秤觉得这就是视觉与味觉的双重享受。"
    天蝎座: "看似简单清雅的蒸菜，底下藏着功夫与巧思，正如天蝎外冷内热的深沉性格。"
    射手座: "充满仪式感的扳指干贝，是射手探寻闽菜精致文化之旅中的亮眼一站。"
    摩羯座: "从挖萝卜到蒸制每一步都有条不紊，摩羯相信耐心操作必能收获完美成果。"
    水瓶座: "把干贝和萝卜重构成扳指形态，水瓶对这道菜的解构主义创意非常赞赏。"
    双鱼座: "扳指干贝晶莹剔透如白玉镶金，双鱼看着这精致模样，心已先醉了。"
