红糟鸡:
  category: 闽菜
  flavors: [咸, 甜, 鲜]
  wuxingMatch: [火, 木]
  ingredients:
    - 三黄鸡 半只
    - 红糟 4大勺
    - 姜 1大块
    - 蒜瓣 5粒
    - 香葱 3根
    - 福建老酒 3大勺
    - 白糖 1大勺
    - 盐 适量
    - 食用油
  steps:
    - 鸡洗净斩成大小均匀的块，姜切片，蒜拍扁，葱切段。
    - 锅烧热下油，爆香姜片至边缘微焦，再下蒜瓣葱白炒出香味。
    - 转小火，倒入红糟慢慢煸炒，直到炒出红亮的酒糟油，香味四溢。
    - 下入鸡块转中火翻炒，让每一块鸡肉都均匀裹满红糟，煸至鸡皮紧缩。
    - 烹入福建老酒，加白糖、盐和适量热水，大火烧开转小火焖煮20分钟至汤汁浓稠。
    - 最后大火收汁，撒入葱段翻炒均匀即可出锅。
  prepTime: 15
  cookTime: 30
  constellationMessage:
    白羊座: "红糟鸡酒香浓郁色泽艳丽，白羊被这热烈的红色和扑鼻香气瞬间点燃食欲。"
    金牛座: "红糟独特的醇厚香气浸润鸡肉，金牛细细品味这时间沉淀出的馥郁滋味。"
    双子座: "红糟这种神奇调料带来迷人玫红色泽，双子对它的发酵魔法充满好奇。"
    巨蟹座: "一道红糟鸡是福州人家的味道，巨蟹用它来温暖家人最平凡也最踏实的日子。"
    狮子座: "色泽红亮喜气洋洋的红糟鸡一上桌，狮子座就认定这是今日餐桌的主角。"
    处女座: "炒制红糟的火候掌控极其关键，处女座对这种精确的油温拿捏非常赞赏。"
    天秤座: "酒香与糟香达成绝妙平衡，天秤座在这道菜里吃出了和谐的味觉美学。"
    天蝎座: "红糟的味道复杂深邃难以捉摸，如同天蝎神秘的内在世界，令人回味无穷。"
    射手座: "带着独特地方风味的红糟鸡，是射手探索闽菜版图上不可或缺的风味地标。"
    摩羯座: "从煸糟到焖煮遵循传统技法，摩羯相信老祖宗的智慧能带来最正宗的美味。"
    水瓶座: "利用红曲发酵而成的天然红色素，水瓶对这种古老而科学的工艺非常着迷。"
    双鱼座: "红糟鸡那抹如晚霞般的绯红，让双鱼在品尝前就已沉醉在这浪漫的色泽里。"
  wuxingMessage:
