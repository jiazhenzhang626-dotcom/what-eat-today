    土: "酒坛为土，慢煨厚德载物，将百味调和成一口踏实温润的浓醇之土。"
    金: "金华火腿如金，点化一整坛的鲜灵，为你理清纷繁思绪，回归纯粹本味。"
    水: "海参鲍鱼等诸般海味，水汽丰沛滋养，为你补充深不可测的智慧与灵动。"
荔枝肉:
  category: 闽菜
  flavors: [甜, 酸, 咸]
  wuxingMatch: [火, 木]
  ingredients:
    - 猪瘦肉 300克
    - 荸荠 6颗
    - 红糟 2大勺
    - 番茄酱 1大勺
    - 白糖 3大勺
    - 白醋 2大勺
    - 蒜瓣 3粒
    - 香葱 2根
    - 湿淀粉 适量
    - 高汤 小半碗
    - 盐 食用油
  steps:
    - 猪瘦肉先片成厚片，再剞上十字花刀，然后改刀切成大小均匀的三角块。荸荠去皮切块，蒜切末葱切段。
    - 肉块用盐、红糟抓匀腌制20分钟入味，然后均匀裹上湿淀粉。
    - 调配荔枝汁：碗中加白糖、白醋、番茄酱、高汤、少许盐和湿淀粉搅匀。
    - 七成热油锅，将肉块炸至卷缩成荔枝状且表面微黄捞出，升高油温复炸至外酥里嫩。
    - 锅留底油，爆香蒜末，倒入荔枝汁煮至浓稠，下入肉块和荸荠块、葱段快速翻炒，让每块肉都裹满酱汁即可。
  prepTime: 25
  cookTime: 15
  constellationMessage:
    白羊座: "荔枝肉酸甜引爆味蕾，热情的白羊一口下去，瞬间被这红润油亮所征服。"
    金牛座: "外酥里嫩的荔枝肉考验刀工与火候，金牛对这道菜的技法精准度深表赞赏。"
    双子座: "明明是肉却形似荔枝，双子对这道菜以假乱真的创意趣味感到着迷。"
    巨蟹座: "酸甜可口的荔枝肉是家宴上的抢手菜，巨蟹用它来慰藉家人一天的疲惫。"
    狮子座: "红亮圆润如颗颗荔枝的造型华丽夺目，狮子座觉得这就是宴客的最佳排面。"
    处女座: "十字花刀每一刀都讲究深浅一致，处女座对这种精确到毫米的细致肃然起敬。"
    天秤座: "酸甜酱汁比例完美平衡，天秤座在味蕾的愉悦中感受到极致的和谐之美。"
    天蝎座: "看似家常的荔枝肉内里暗藏精妙刀法，一如天蝎深藏不露的精巧心思。"
    射手座: "带着红糟独特香气的荔枝肉，射手觉得这就是福州美食地图上必探的宝藏。"
    摩羯座: "从改刀到调汁步步都有章法，摩羯相信只要按部就班就能完美复刻经典。"
    水瓶座: "把猪肉做成水果的形态，水瓶对这种充满创造力的烹饪魔术师手法很着迷。"
    双鱼座: "荔枝肉名字浪漫造型讨喜，双鱼先要拍下这盘红润剔透才舍得动筷子。"
  wuxingMessage:
    木: "荸荠的清脆木气生发，为你带来清甜爽脆的新意，消散内心烦闷。"
    火: "红糟与番茄酱火色夺目，油炸瞬间锁住肉汁，赋予你满腔热情与活力。"
    土: "糖醋调和温润如土，酸甜适口，给你最踏实妥帖的味觉依靠。"
    金: "精瘦肉白晰如金，刀下生花，帮你斩断今日的琐碎烦恼，回归条理。"
    水: "复炸提香芡汁润泽，水行滋养流转，为你的灵感带来活水之源。"
鸡汤氽海蚌:
  category: 闽菜
  flavors: [鲜, 咸]
  wuxingMatch: [水, 金]
  ingredients:
    - 漳港海蚌 4只
    - 老母鸡 1只
    - 鸡胸肉 1块
    - 金华火腿 1小块
    - 干贝 数粒
    - 葱段 姜片
    - 绍兴酒 少许
    - 盐
  steps:
    - 老母鸡处理干净整只下锅，加足量水、姜片葱段、火腿干贝，小火慢吊4小时成鲜美高汤。
    - 鸡胸肉剁成鸡茸，放入微凉的高汤中开大火吸附杂质扫汤，过滤后得到清澈见底的清汤，加盐调味。
    - 海蚌撬开取肉，摘去肠脏洗净，片成薄片，用少许绍兴酒抓匀去腥。
    - 锅中烧开水，将海蚌片迅速焯烫3秒立刻捞出，分入汤碗。
    - 将滚烫至极的清汤冲入碗中，瞬间烫熟蚌肉，汤清如水却鲜味浓郁，立刻享用。
  prepTime: 60
  cookTime: 240
  constellationMessage:
    白羊座: "滚烫鸡汤瞬间冲熟蚌肉，白羊被这种迅猛利落的手法所吸引，鲜得痛快。"
    金牛座: "清水般汤头却有震撼鲜味，金牛慢慢品味，感受到这道菜的奢华与内敛。"
    双子座: "鸡汤与海蚌用如此戏剧化方式相遇，双子觉得这道菜的仪式感非常有趣。"
    巨蟹座: "一碗烫嘴的清鲜鸡汤蚌肉，是巨蟹最想给予家人的极致温柔与呵护。"
    狮子座: "清澈见底的汤底暗藏顶级鲜味，狮子座觉得这就是低调奢华的真正排面。"
    处女座: "扫汤后澄清如水滴油不沾，处女座被这种追求极致的净化工艺深深折服。"
    天秤座: "清汤与蚌肉在瞬间相遇的优雅平衡，天秤在这道至简至鲜的菜里找到了美的极致。"
    天蝎座: "汤清如水却内蕴深不见底的鲜美，像极了心思深沉、不可貌相的天蝎。"
    射手座: "海蚌的鲜与鸡汤的醇交织，射手觉得这一碗就是福建海洋与山野的自由合奏。"
    摩羯座: "吊汤扫汤每一步都极需耐心与技巧，摩羯对这种时间沉淀的功力深信不疑。"
    水瓶座: "利用瞬间热量完成烹饪的分子料理式手法，让水瓶对这种前卫手法很着迷。"
    双鱼座: "鸡汤氽海蚌如海神馈赠般唯美纯净，双鱼喝下这碗仙汤，心都化了。"
  wuxingMessage:
