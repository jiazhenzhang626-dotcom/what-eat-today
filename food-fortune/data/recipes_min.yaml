    天秤座: "醋酸与糖甜在此形成绝妙平衡，天秤座享受这种令人愉悦的味觉和谐。"
    天蝎座: "名为醉却无酒，以酸甜醉人之意，一如天蝎以深沉魅力迷人而不自知。"
    射手座: "带着番茄与蒜香复合风味的醉排骨，是射手探访福州必点的下饭神器。"
