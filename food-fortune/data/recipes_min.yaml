肉燕:
  category: 闽菜
  flavors: [鲜, 咸]
  wuxingMatch: [金, 水]
  ingredients:
    - 猪后腿瘦肉 500克
    - 番薯粉 200克
    - 五花猪肉 200克
    - 荸荠 5颗
    - 虾米 1把
    - 香葱 姜末
    - 生抽 盐 糖
    - 高汤 1锅
    - 紫菜 葱花 香醋
  steps:
    - 猪后腿瘦肉剔除筋膜，用大木槌反复捶打成细腻的肉泥，边捶边挑去细筋，撒入番薯粉继续揉压成燕皮面坯。
    - 将燕皮面团擀成薄如纸的皮，切成正方形小张。
    - 五花肉剁成肉茸，荸荠剁碎，加虾米、葱姜末、生抽、盐、糖搅拌上劲成肉馅。
    - 燕皮包入少许肉馅，捏成飞燕状或小馄饨状，收口处沾点水粘合。
    - 锅中水烧开，下入包好的肉燕，煮至浮起透明捞出，放入另一锅滚烫的高汤中。
    - 碗中放少许紫菜、葱花，盛入高汤和肉燕，根据口味淋入几滴香醋和白胡椒粉。
  prepTime: 90
  cookTime: 10
