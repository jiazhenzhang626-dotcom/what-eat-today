# 闽菜专辑 —— 24道经典福建风味
# 字段与 recipes.yaml 完全一致，含完整星座/五行文案

佛跳墙:
  category: 闽菜
  flavors: [鲜, 咸]
  wuxingMatch: [水, 土]
  ingredients:
    - 水发鲍鱼 4只
    - 水发海参 4条
    - 干贝 8粒
    - 鱼翅 适量
    - 花胶 2块
    - 猪蹄 1只
    - 鸡肉 半只
    - 鸭肉 半只
    - 花菇 6朵
    - 冬笋 1个
    - 金华火腿 1小块
    - 高汤 足量
    - 绍兴酒 半碗
    - 葱段 姜片 盐
  steps:
    - 所有干货提前数天分别泡发清洗干净。猪蹄、鸡、鸭斩块焯水去血沫，火腿切片。
    - 取一个陈年酒坛，底部铺上姜片葱段，依次码入猪蹄、鸡肉、鸭肉、冬笋、花菇、火腿。
    - 再将鲍鱼、海参、干贝、鱼翅、花胶等海味整齐铺在顶层，层层堆叠。
    - 注入足量滚烫高汤至没过食材，淋入绍兴酒，用荷叶密封坛口。
    - 将坛子移至微火上，慢火煨炖至少6小时，直到各种食材的胶质与鲜味完全融合，汤汁浓郁金黄。
    - 开坛弃去葱姜，撇去浮油，加盐调味即可上桌。
  prepTime: 120
  cookTime: 360
  constellationMessage:
    白羊座: "热情的白羊，这坛汇聚山海精华的佛跳墙，瞬间点燃你心中对极致美味的渴望。"
    金牛座: "慢火细炖的佛跳墙如金牛般沉稳，每一口浓醇胶质都是时间沉淀的奢华馈赠。"
    双子座: "食材丰富如群仙聚会的佛跳墙，让好奇的双子在每一勺里都能发现新的惊喜。"
    巨蟹座: "家宴上镇场之宝佛跳墙，巨蟹端出它时，满坛的温暖浓情胜过千言万语。"
    狮子座: "坛启荤香飘四邻的佛跳墙，只有这般霸道香气才配得上狮子座的王者风范。"
    处女座: "数十种食材处理得一丝不苟完美融合，处女座被这道菜的极致工艺深深折服。"
    天秤座: "山海珍馐在坛中达成绝妙平衡，天秤座品的就是这份浓而不腻的和谐之美。"
    天蝎座: "深藏坛中煨足时辰才露真容的佛跳墙，像极了深藏不露、一鸣惊人的天蝎。"
    射手座: "囊括山珍海味的佛跳墙，正是射手走遍世界后最想带回餐桌的壮丽诗篇。"
    摩羯座: "煨这道佛跳墙需要极强的耐心与规划，摩羯很享受这种按部就班成就经典的快感。"
    水瓶座: "把整个山海装进酒坛的奇思妙想，水瓶座对这种天才般的烹饪创意赞叹不已。"
    双鱼座: "佛跳墙如瑶池珍馐般美好梦幻，双鱼品尝时仿佛置身于琼楼玉宇的仙境中。"
  wuxingMessage:
    木: "冬笋与花菇的木气生发舒展，为你涤荡沉闷，带来竹林清风般的清新活力。"
