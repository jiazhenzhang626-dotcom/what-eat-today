  wuxingMatch: [火, 木]
  ingredients:
    - 猪小排 400克
    - 芋头 200克
    - 生抽 2大勺
    - 香醋 3大勺
    - 白糖 3大勺
    - 番茄酱 1大勺
    - 鸡蛋 1个
    - 蒜瓣 5粒
    - 香葱 3根
    - 淀粉 适量
    - 盐 料酒 食用油
  steps:
    - 排骨斩成小块，加盐料酒腌15分钟，打入一个蛋黄抓匀，再裹上一层薄薄的干淀粉。
    - 芋头去皮切成菱形小块。大蒜剁成蒜泥，葱切段。
    - 调配醉汁：碗中加生抽、香醋、白糖、番茄酱、少许清水、蒜泥拌匀备用。
    - 油烧七成热，先下芋头块炸至金黄酥脆捞出，再下排骨块炸至表面焦黄熟透捞出。
    - 另起锅小火，倒入调好的醉汁煮至微沸冒泡，淋入少许水淀粉勾薄芡至浓稠。
    - 立刻倒入炸好的排骨和芋头、葱段，快速颠锅翻炒让每块食材都挂满酱汁出锅。
  prepTime: 30
  cookTime: 15
  constellationMessage:
    白羊座: "酸甜浓郁的醉汁裹着酥炸排骨，白羊被这股酸甜暴击瞬间唤醒全部活力。"
