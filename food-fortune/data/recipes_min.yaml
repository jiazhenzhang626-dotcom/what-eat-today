大肠血:
  category: 闽菜
  flavors: [咸, 鲜, 辣]
  wuxingMatch: [金, 火]
  ingredients:
    - 猪大肠 500克
    - 新鲜猪血 300克
    - 大骨 1根
    - 韭菜 1小把
    - 姜 1大块
    - 蒜瓣 5粒
    - 白胡椒粉 大量
    - 盐 料酒 白醋 面粉
  steps:
    - 猪大肠用面粉、盐、白醋反复揉搓冲洗干净，翻面摘去多余油脂。
    - 猪血加少许盐轻轻搅匀，灌入洗净的大肠内，两端用棉线扎紧。
    - 大骨焯水后加足量水、姜片、蒜瓣熬成白汤，放入灌好血的大肠，加料酒。
    - 小火保持汤面微沸不滚，慢浸煮20分钟，用牙签扎肠衣若流出清液则熟透，捞出晾凉切斜片。
    - 汤底加盐、大量白胡椒粉调味，放入切好的肠血片烫热，出锅前撒一把切碎的韭菜提香。
